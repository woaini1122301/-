<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVID's Space | 空间计算美学</title>
    <style>
        /* ================= 基础与变量配置 - 改为 Interstellar 黑洞配色 ================= */
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            /* 【配色：黑 + 橙】 accent-color 改为黑洞的金色/橙色 */
            --accent-color: #ffcc00; 
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-hover: rgba(255, 255, 255, 0.07);
            --contact-panel-bg: rgba(10, 10, 15, 0.95); /* 联系面板背景，更深邃 */
            
            /* 【配色：橙】 卡片悬停时的呼吸背光改为金色光晕 */
            --work-shadow-hover: 0 15px 50px -10px rgba(255, 204, 0, 0.3); 
            --project-shadow-hover: 0 10px 40px -10px rgba(255, 204, 0, 0.2); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
            line-height: 1.6;
            background: #000; /* 确保底色纯黑 */
        }

        /* ================= 空间背景与特效层 ================= */
        /* 极光背景层 (底层) */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -3; /* 垫底 */
            background: #000000;
            overflow: hidden;
        }
        
        /* 极淡的极光底色，增加深邃感 */
        .aurora-light {
            position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background: radial-gradient(circle at center, rgba(60, 0, 100, 0.1), transparent 60%),
                        radial-gradient(circle at 90% 10%, rgba(20, 40, 100, 0.1), transparent 40%);
            filter: blur(80px);
            animation: aurora-move 20s ease-in-out infinite alternate;
            opacity: 0.6;
        }

        /* 新增的 Gargantua 黑洞吸积盘 Canvas 画布容器，置于底层 */
        #particle-nebula {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; /* 位于极光之上，文字之下 */
            opacity: 1; 
            pointer-events: auto; /* 允许捕获鼠标事件进行对焦交互 */
        }

        @keyframes aurora-move {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(-15px, 15px); }
        }

        /* ================= 顶部导航栏 ================= */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(0, 0, 0, 0.3); /* 更透明 */
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .nav-container {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1400px; margin: 0 auto; padding: 18px 40px;
        }
        
        /* 导航栏左侧 Logo */
        .nav-logo {
            font-size: 15px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s ease;
            color: rgba(255,255,255,0.8);
        }
        .nav-logo:hover {
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.7);
            color: #fff;
        }

        /* 导航栏中间 页面链接 */
        .nav-links { display: flex; gap: 35px; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none;
            font-size: 14px; font-weight: 500; transition: all 0.3s ease; cursor: pointer;
            position: relative; padding: 4px 0;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        /* 增加下划线指示器 */
        .nav-links a::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px;
            background-color: var(--text-primary); transition: width 0.3s ease;
        }
        .nav-links a.active::after { width: 100%; }

        /* 导航栏右侧 与我联系 + 弹出面板 */
        .nav-contact-wrapper { position: relative; }
        .nav-contact-trigger {
            color: var(--text-secondary); cursor: pointer;
            font-size: 14px; font-weight: 500; transition: color 0.3s;
            padding: 5px 10px; border-radius: 4px;
        }
        .nav-contact-trigger:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
        
        /* 弹出联系面板样式 */
        .nav-contact-panel {
            position: absolute; top: calc(100% + 15px); right: 0;
            width: 280px; padding: 25px;
            background: var(--contact-panel-bg);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            opacity: 0; pointer-events: none; visibility: hidden;
            transform: translateY(10px); transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 15px 50px -10px rgba(0, 0, 0, 0.8);
        }
        .nav-contact-panel.show {
            opacity: 1; pointer-events: auto; visibility: visible;
            transform: translateY(0);
        }
        .contact-item { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; }
        .contact-item:last-child { margin-bottom: 0; }
        /* 【配色：橙】 */
        .contact-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(255, 204, 0, 0.15); border: 1px solid rgba(255, 204, 0, 0.2); display: flex; align-items: center; justify-content: center; color: var(--accent-color); font-size: 12px; font-weight: bold; }
        .contact-info { font-size: 14px; color: var(--text-primary); }
        .contact-info div { color: var(--text-secondary); font-size: 12px; margin-bottom: 2px; }
        .contact-info a { color: var(--text-primary); text-decoration: none; transition: color 0.3s; }
        .contact-info a:hover { text-decoration: underline; color: var(--accent-color); }

        /* ================= 页面视图通用容器 ================= */
        main { padding: 90px 5% 60px; max-width: 1250px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 10; }
        .page-view { display: none; }
        .page-view.active { display: block; animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= 通用：微玻璃拟态卡片 ================= */
        .glass-card {
            background: rgba(255, 255, 255, 0.015);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 35px;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            transition: box-shadow 0.4s cubic-bezier(0.22, 1, 0.36, 1), border-color 0.4s ease, background 0.4s ease, transform 0.1s; /* 优化：分离 transform 过渡以防止 3D 悬浮卡顿 */
            position: relative; overflow: hidden;
        }
        
        /* 鼠标跟随发光效果核心 - 修改为微橙色 */
        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 204, 0, 0.06), transparent 40%);
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 0;
        }
        .glass-card:hover::before { opacity: 1; }
        .glass-card > * { position: relative; z-index: 1; }

        /* ================= 页面表头介绍居中 (你的排腰) ================= */
        .page-header { 
            margin-bottom: 45px; 
            text-align: center; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .page-header h2 { font-size: 38px; font-weight: 700; margin-bottom: 12px; letter-spacing: -1px; background: linear-gradient(180deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header p { font-size: 15px; color: var(--text-secondary); max-width: 650px; font-weight: 300; line-height: 1.8; }

        /* ================= 首页视图 ================= */
        .hero { height: 75vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; pointer-events: none; /* 穿透鼠标事件给背景黑洞进行对焦 */ }
        .hero h1 { font-size: 64px; font-weight: 700; margin-bottom: 20px; letter-spacing: -2px; background: linear-gradient(180deg, #fff, #ccc); -webkit-background-clip: text; -webkit-text-fill-color: transparent;}
        .hero p { font-size: 20px; color: rgba(255,255,255,0.7); font-weight: 300; letter-spacing: 0.5px; max-width: 600px; line-height: 1.8; }

        /* ================= 工作履历视图 ================= */
        .work-container { padding-top: 10px; }
        .work-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 28px 35px; margin-bottom: 20px;
            cursor: pointer;
        }
        /* 【配色：橙】 鼠标悬停背光显现金色光晕 */
        .work-row:hover { 
            box-shadow: var(--work-shadow-hover); 
            border-color: rgba(255, 204, 0, 0.15); 
            background: rgba(255,255,255,0.025);
            transform: translateY(-2px);
        }

        .work-left { display: flex; align-items: center; gap: 25px; flex-grow: 1; }
        /* 【配色：橙】 GL -> GL金色 Logo */
        .company-logo { width: 50px; height: 50px; border-radius: 12px; background: rgba(255, 204, 0, 0.05); border: 1px solid rgba(255, 204, 0, 0.1); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent-color); font-size: 16px;}
        .work-info { flex-grow: 1; text-align: left; }
        .work-title { font-size: 19px; font-weight: 600; margin-bottom: 6px; color: #fff; }
        .work-desc { font-size: 14px; color: var(--text-secondary); max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 300; }
        .work-row:hover .work-desc { max-height: 100px; opacity: 1; margin-top: 10px; }

        .work-right { text-align: right; color: var(--text-secondary); flex-shrink: 0; padding-left: 40px;}
        .work-role { font-weight: 500; font-size: 15px; color: var(--text-primary); margin-bottom: 4px; }
        .work-time { font-size: 13px; opacity: 0.7; font-weight: 300; }

        /* ================= 项目经验视图 ================= */
        .projects-controls { margin-bottom: 45px; display: flex; justify-content: center;}
        /* 你的排腰 (居中状态保持) */
        .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); }
        .filter-btn {
            background: transparent; border: none; color: var(--text-secondary);
            padding: 8px 24px; border-radius: 30px; cursor: pointer; transition: all 0.3s ease;
            font-size: 14px; font-weight: 500;
        }
        .filter-btn:hover { color: var(--text-primary); }
        /* 【配色：橙】 筛选按钮高亮样式 */
        .filter-btn.active { background: rgba(255,255,255,0.08); color: var(--text-primary); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .bento-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 25px; /* 卡片间距适中 */
        }
        .project-card {
            height: 320px; display: flex; flex-direction: column; cursor: pointer;
            transform-style: preserve-3d; /* 用于视差效果 */
            text-align: left;
        }
        /* 【配色：橙】 项目卡片悬停背光 */
        .project-card:hover { 
            box-shadow: var(--project-shadow-hover); 
            border-color: rgba(255, 204, 0, 0.1); 
            background: rgba(255,255,255,0.025);
            transform: translateY(-3px);
        }

        /* 【配色：橙】 分类文字 */
        .proj-category { font-size: 12px; color: var(--accent-color); font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1.5px; }
        .proj-title { font-size: 19px; font-weight: 600; margin-bottom: 15px; color: #fff; line-height: 1.4; }
        .proj-desc { font-size: 14px; color: var(--text-secondary); flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; line-height: 1.7; font-weight: 300; }
        .proj-more { align-self: flex-end; font-size: 13px; color: var(--text-primary); display: flex; align-items: center; gap: 6px; opacity: 0; transform: translateX(-10px); transition: all 0.3s ease; padding-top: 15px; font-weight: 500; }
        .project-card:hover .proj-more { opacity: 1; transform: translateX(0); }

        /* ================= 三级详情页视图 ================= */
        .back-btn { display: inline-block; margin-bottom: 40px; color: var(--text-secondary); cursor: pointer; font-size: 14px; transition: color 0.3s; font-weight: 500; }
        .back-btn:hover { color: var(--text-primary); }
        .detail-header { margin-bottom: 40px; text-align: center; }
        .detail-title { font-size: 40px; margin-bottom: 18px; font-weight: 700; color: #fff; letter-spacing: -1px; line-height: 1.2;}
        .detail-meta { display: flex; gap: 30px; color: var(--text-secondary); font-size: 15px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 25px; justify-content: center; font-weight: 300; }
        /* 【配色：橙】 加粗元数据 */
        .detail-meta span strong { color: rgba(255,255,255,0.9); font-weight: 500; margin-right: 5px; }
        .detail-content { font-size: 16px; color: #eaeaea; line-height: 1.9; white-space: pre-line; font-weight: 300; max-width: 900px; margin: 0 auto; text-align: left; }

    </style>
</head>

            { id: 8, category: "市场增长", title: "【MEB美尔贝】医美平台双十一全网狂欢节商业化大促", company: "MEB美尔贝", time: "2020", role: "项目经理", desc: "统筹全年最大规模促销节点，打通站内外流量实现品效合一，GMV同比倍增。", detail: "全盘负责医美平台商业化运营和大促策划，统筹产品、运营、市场资源。核心职责包括双十一全周期GMV分解与目标达成规划，站内用户全生命周期增长模型搭建，KOL矩阵投流复盘及 GMV 最终达标。详情见此部分。" }
        ];

        // ================= 交互与路由逻辑 =================

        // A. 与我联系弹出面板逻辑
        const contactWrapper = document.getElementById('contact-wrapper');
        const contactPanel = document.getElementById('contact-panel');

        contactWrapper.addEventListener('mouseenter', () => {
            contactPanel.classList.add('show');
        });

        // 鼠标彻底离开wrapper区域再隐藏，增加操作宽容度
        contactWrapper.addEventListener('mouseleave', () => {
            contactPanel.classList.remove('show');
        });

        // 如果用户点击了面板内部，点击后隐藏
        contactPanel.addEventListener('click', (e) => {
            if(e.target.tagName === 'A') { // 点击了链接才隐藏
                 contactPanel.classList.remove('show');
            }
        });


        // B. 页面路由与切换
        function switchPage(pageId) {
            window.scrollTo(0,0); // 滚回顶部
            
            // 切换 Canvas 的可见性，节省资源
            const nebulaCanvas = document.getElementById('particle-nebula');
            if(pageId === 'home') {
                nebulaCanvas.style.opacity = '1';
                nebulaCanvas.style.visibility = 'visible';
            } else {
                nebulaCanvas.style.opacity = '0';
                nebulaCanvas.style.visibility = 'hidden';
            }

            document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // 更新文字导航激活态
            document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('active'));
            if(pageId !== 'project-detail' && pageId !== 'home') {
                document.getElementById('nav-' + pageId).classList.add('active');
            } else if (pageId === 'project-detail') {
                document.getElementById('nav-projects').classList.add('active');
            }
        }

        // C. 渲染工作履历 (增加行悬停背光效果初始化)
        function renderWork() {
            const container = document.getElementById('work-container');
            container.innerHTML = workData.map(work => `
                <div class="glass-card work-row hover-effect tilt-card">
                    <div class="work-left">
                        <div class="company-logo">${work.logo}</div>
                        <div class="work-info">
                            <div class="work-title">${work.company}</div>
                            <div class="work-desc">${work.desc}</div>
                        </div>
                    </div>
                    <div class="work-right">
                        <div class="work-role">${work.role}</div>
                        <div class="work-time">${work.time}</div>
                    </div>
                </div>
            `).join('');
        }

        // D. 渲染项目卡片 (优化卡片视差效果初始化)
        function renderProjects(category = '全部') {
            const grid = document.getElementById('projects-grid');
            const filtered = category === '全部' ? projectsData : projectsData.filter(p => p.category === category);
            
            grid.innerHTML = filtered.map(p => `
                <div class="glass-card project-card tilt-card hover-effect" onclick="openDetail(${p.id})">
                    <div class="proj-category">${p.category}</div>
                    <div class="proj-title">${p.title}</div>
                    <div class="proj-desc">${p.desc}</div>
                    <div class="proj-more">查看案例详情 →</div>
                </div>
            `).join('');

            initHoverLight(); // 初始化微玻璃呼吸光效
            initTiltEffect(); // 初始化tvOS同款视差倾斜
        }

        // E. 项目筛选
        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === category);
            });
            renderProjects(category);
        }

        // F. 打开项目详情
        function openDetail(id) {
            const project = projectsData.find(p => p.id === id);
            if(!project) return;

            document.getElementById('detail-category').innerText = project.category;
            document.getElementById('detail-title').innerText = project.title;
            
            // 填充元数据
            document.querySelector('#detail-time .val').innerText = project.time;
            document.querySelector('#detail-company .val').innerText = project.company;
            document.querySelector('#detail-role .val').innerText = project.role;
            
            document.getElementById('detail-content').innerText = project.detail;

            switchPage('project-detail');
        }

        // G. tvOS 同款 3D 视差倾斜动效 (核心细节)
        function initTiltEffect() {
            document.querySelectorAll('.tilt-card').forEach(card => {
                // 确保监听器只绑定一次，防止重新渲染导致的性能问题
                card.onmousemove = null;
                card.onmouseleave = null;
                
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    // 计算倾斜角度，限制在正负6度以内保持丝滑
                    const rotateX = ((y - centerY) / centerY) * -6; 
                    const rotateY = ((x - centerX) / centerX) * 6;
                    
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                });
            });
        }

        // H. 微玻璃拟态呼吸光效 (鼠标跟随发光)
        function initHoverLight() {
            document.querySelectorAll('.hover-effect').forEach(card => {
                card.onmousemove = e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                };
            });
        }

        // ===========================================
        // I. 【核心重写】：浩瀚 Gargantua 黑洞粒子系统
        // (Full Screen, High Density, W warped, 영화색감)
        // ===========================================
        function initParticleNebula() {
            const canvas = document.getElementById('particle-nebula');
            const ctx = canvas.getContext('2d');
            
            let width, height;
            let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;

            // 设置画布尺寸
            function resizeCanvas() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                initParticles(); // 尺寸改变时重新初始化
            }
            window.addEventListener('resize', resizeCanvas);
            
            // 鼠标移动监听，用于粒子对焦交互
            window.addEventListener('mousemove', e => {
                mouseX = e.clientX;
                mouseY = e.clientY;
            });

            resizeCanvas();

            const particles = [];
            // 【密度大幅提升】：使用 1500 个粒子创造稠密沙砾感
            const numParticles = 1500; 
            
            // 粒子类定义
            class Particle {
                constructor() {
                    this.init();
                }

                init() {
                    // 【造型核心】：使用扁平的极坐标分布模拟卡冈图雅的吸积盘
                    const theta = Math.random() * 2 * Math.PI; // 角度
                    // 核心半径 + 开方让粒子更多地聚集在黑洞边缘，但有很长的扁平蔓延
                    const coreRadius = Math.random() * width * 0.15 + width * 0.03;
                    const edgeRadius = Math.pow(Math.random(), 2) * width * 1.5; 
                    const radius = Math.random() < 0.8 ? coreRadius : edgeRadius;
                    
                    // 初始 3D 坐标
                    this.rawX = radius * Math.cos(theta);
                    // Gargantua 是扁平的吸积盘，Y 轴分布必须极其狭窄
                    this.rawY = (Math.random() * 2 - 1) * width * 0.015; 
                    // Z 轴（深度）：使用较远的深度增加空间感
                    this.rawZ = Math.random() * width * 2 - width; 
                    
                    this.size = Math.random() * 2.5 + 0.5; // 基础大小
                    
                    // 【精致造型】：使用电影卡冈图雅色调：琥珀、金色、微白
                    const colors = [
                        'rgba(255, 180, 0, ', // 琥珀
                        'rgba(255, 220, 100, ', // 金色
                        'rgba(255, 255, 255, '  // 纯白微光
                    ];
                    this.colorPrefix = colors[Math.floor(Math.random() * colors.length)];
                    
                    // 慢速自转速度
                    this.speed = Math.random() * 0.0006 + 0.0001; 
                }

                update(time) {
                    // 绕 Y 轴缓慢自转
                    const angle = time * this.speed;
                    const cosA = Math.cos(angle);
                    const sinA = Math.sin(angle);
                    
                    // 应用旋转公式
                    const x = this.rawX * cosA - this.rawZ * sinA;
                    const z = this.rawX * sinA + this.rawZ * cosA;
                    const y = this.rawY;

                    // 【黑洞扭曲效果核心 (Wwarped)】：沿 X 轴应用不规则倾斜角和透视扭曲
                    const tilt = 0.5;
                    const tiltedY = y * Math.cos(tilt) - z * Math.sin(tilt);
                    const tiltedZ = y * Math.sin(tilt) + z * Math.cos(tilt);

                    // 简易 3D 透视投影
                    const fov = width * 1.0; 
                    const scale = fov / (fov + tiltedZ);
                    
                    // 【非居中且蔓延全屏】：将黑洞中心偏置，但粒子扩散至全屏
                    const centerX = width * 0.75; // 你的非居中偏置位置保持
                    const centerY = height * 0.6;
                    this.px = centerX + x * scale;
                    this.py = centerY + tiltedY * scale;

                    // 根据 Z 轴深度调整最终大小和透明度
                    this.finalSize = this.size * scale;
                    // Z 轴越远，透明度越低
                    this.alpha = Math.max(0.1, Math.min(0.9, scale * 0.7)); 

                    // 【精致交互】：鼠标近距离对焦微亮效果
                    if (mouseX !== null && mouseY !== null) {
                        const dx = this.px - mouseX;
                        const dy = this.py - mouseY;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        const intersectRadius = 150; // 交互半径
                        
                        if (dist < intersectRadius) {
                            // 距离越近，亮度越高，大小稍微放大，模拟景深对焦
                            const force = (intersectRadius - dist) / intersectRadius;
                            this.alpha += force * 0.3;
                            this.finalSize *= (1 + force * 0.2);
                        }
                    }
                }

                draw() {
                    // 绘制稠密颗粒：Arc 创造细腻的沙砾感
                    ctx.beginPath();
                    ctx.arc(this.px, this.py, this.finalSize, 0, Math.PI * 2);
                    ctx.fillStyle = this.colorPrefix + this.alpha + ')';
                    ctx.fill();
                }
            }

            // 初始化粒子数组
            function initParticles() {
                particles.length = 0; // 清空数组
                for (let i = 0; i < numParticles; i++) {
                    particles.push(new Particle());
                }
            }

            let time = 0;
            // 渲染主循环
            function renderNebula() {
                // 确保只有画布可见时才计算，节省资源 (switchPage逻辑控制 visibility)
                if (canvas.style.visibility !== 'hidden') {
                    // 清空画布 (不使用半透明清除，保持颗粒的清晰沙砾感)
                    ctx.clearRect(0, 0, width, height); 
                    time++; 

                    for (let i = 0; i < particles.length; i++) {
                        particles[i].update(time);
                        particles[i].draw();
                    }
                }
                requestAnimationFrame(renderNebula);
            }
            
            renderNebula();
        }

        // ===========================================
        // J. 全局初始化
        // ===========================================
        window.onload = () => {
            renderWork();
            renderProjects();
            // 应用行倾斜和背光（虽然渲染是动态的，但需要为初始行添加监听）
            initHoverLight();
            initTiltEffect(); 
            initParticleNebula(); // 启动粒子星系
            // 默认首页淡入
            document.getElementById('particle-nebula').style.opacity = '1';
        };

    </script>
