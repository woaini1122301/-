<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVID's Space | 商业与增长</title>
    <style>
        /* --- 基础变量 --- */
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --contact-panel-bg: rgba(10, 10, 15, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
            line-height: 1.6;
        }

        /* --- 首页全屏 Canvas 粒子背景 --- */
        #particle-canvas {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -1;
            background: radial-gradient(circle at center, #121220 0%, #000000 100%);
            opacity: 0; transition: opacity 0.8s ease;
            pointer-events: auto;
        }
        #particle-canvas.active { opacity: 1; }

        /* 二级页面基础背景 (深色纯净) */
        .subpage-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            background: linear-gradient(180deg, #000000 0%, #0a0a12 100%);
        }

        /* --- 顶部导航栏 --- */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-container {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1400px; margin: 0 auto; padding: 18px 40px;
        }
        /* Logo 兼具返回首页功能 */
        .nav-logo { 
            font-size: 16px; font-weight: 700; letter-spacing: 1.5px; 
            text-transform: uppercase; cursor: pointer; transition: 0.3s;
        }
        .nav-logo:hover { text-shadow: 0 0 15px rgba(255,255,255,0.8); }
        
        .nav-links { display: flex; gap: 40px; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none;
            font-size: 15px; font-weight: 500; transition: all 0.3s; cursor: pointer;
            position: relative; padding: 4px 0;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px;
            background-color: var(--text-primary); transition: width 0.3s ease;
        }
        .nav-links a.active::after { width: 100%; }

        /* 右侧悬停联系方式 */
        .nav-contact-wrapper { position: relative; }
        .nav-contact-trigger {
            color: var(--text-secondary); cursor: pointer; font-size: 14px; font-weight: 500; 
            padding: 8px 18px; border: 1px solid transparent; border-radius: 20px; transition: 0.3s;
        }
        .nav-contact-wrapper:hover .nav-contact-trigger {
            color: var(--text-primary); background: var(--glass-bg); border-color: var(--glass-border);
        }
        .nav-contact-panel {
            position: absolute; top: calc(100% + 15px); right: 0; width: 280px; padding: 25px;
            background: var(--contact-panel-bg); border: 1px solid var(--glass-border); border-radius: 16px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            opacity: 0; pointer-events: none; transform: translateY(10px); transition: all 0.3s ease;
            box-shadow: 0 15px 50px -10px rgba(0,0,0,0.8);
        }
        .nav-contact-wrapper:hover .nav-contact-panel { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .contact-item { display: flex; gap: 15px; align-items: center; margin-bottom: 18px; }
        .contact-item:last-child { margin-bottom: 0; }
        .contact-icon { width: 36px; height: 36px; border-radius: 10px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: bold; border: 1px solid var(--glass-border);}
        .contact-info { font-size: 14px; color: var(--text-primary); }
        .contact-info a { color: var(--text-primary); text-decoration: none; }
        .contact-info a:hover { text-decoration: underline; }

        /* --- 页面主体容器 --- */
        /* 优化：将 padding-top 从 120px 缩减到 90px，大幅减少顶部的留白 */
        main { padding: 90px 5% 60px; max-width: 1300px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 10; }
        .page-view { display: none; }
        .page-view.active { display: block; animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 首页：极致留白 --- */
        /* 彻底删除了内部文字，仅作为粒子背景的容器 */
        .hero-home { height: 85vh; display: flex; align-items: center; justify-content: center; pointer-events: none; }
        
        /* --- 二级页面通用居中表头 --- */
        .page-header-centered {
            text-align: center; margin-bottom: 40px; /* 优化：缩小了表头和下方内容的间距 */
            display: flex; flex-direction: column; align-items: center;
        }
        .page-header-centered h2 {
            font-size: 40px; font-weight: 800; margin-bottom: 16px; letter-spacing: 2px;
            background: linear-gradient(180deg, #ffffff 0%, #888888 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .page-header-centered p {
            font-size: 16px; color: var(--text-secondary); max-width: 650px; line-height: 1.8;
        }
        
        /* --- 工作履历页 列表样式 --- */
        .work-item { display: flex; align-items: center; justify-content: space-between; padding: 28px 35px; margin-bottom: 25px; cursor: pointer; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; transition: all 0.4s; }
        .work-item:hover { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.15); box-shadow: 0 20px 60px -10px rgba(0,0,0,0.5); transform: translateY(-3px); }
        .work-left { display: flex; align-items: center; gap: 25px; flex-grow: 1; }
        .company-logo { width: 52px; height: 52px; border-radius: 14px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; }
        .work-info-meta { flex-grow: 1; }
        .work-company-name { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .work-job-desc { font-size: 14px; color: var(--text-secondary); max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        .work-item:hover .work-job-desc { max-height: 150px; opacity: 1; margin-top: 10px; }
        .work-right { text-align: right; color: var(--text-secondary); padding-left: 40px; flex-shrink: 0; }
        .work-pos { font-size: 16px; font-weight: 500; color: var(--text-primary); margin-bottom: 4px; }
        .work-duration { font-size: 14px; opacity: 0.8; }

        /* --- 项目经验页：居中的分类筛选器 & Bento Grid --- */
        .filter-bar { display: flex; justify-content: center; flex-wrap: wrap; gap: 14px; margin-bottom: 50px; }
        .filter-btn {
            background: transparent; border: 1px solid var(--glass-border); color: var(--text-secondary);
            padding: 10px 26px; border-radius: 30px; cursor: pointer; transition: all 0.3s; font-size: 14px; font-weight: 500;
        }
        .filter-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-primary); }
        .filter-btn.active { background: var(--text-primary); color: var(--bg-color); border-color: var(--text-primary); font-weight: 600; }

        .bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; }
        .project-card { 
            height: 320px; display: flex; flex-direction: column; cursor: pointer; transform-style: preserve-3d;
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px; padding: 35px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); transition: all 0.4s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .project-card:hover { transform: translateY(-5px); border-color: rgba(255,255,255,0.2); box-shadow: 0 15px 40px -10px rgba(0,0,0,0.6); }
        .proj-cat { font-size: 12px; color: #a0a0f0; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        .proj-title { font-size: 20px; font-weight: 600; margin-bottom: 15px; line-height: 1.4;}
        .proj-intro { font-size: 14px; color: var(--text-secondary); flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; line-height: 1.7;}
        .proj-link { align-self: flex-end; font-size: 14px; color: var(--text-primary); display: flex; align-items: center; gap: 6px; opacity: 0; transform: translateX(-10px); transition: 0.3s; padding-top: 15px; }
        .project-card:hover .proj-link { opacity: 1; transform: translateX(0); }

    </style>
</head>
<body>

    <div class="subpage-bg"></div>

    <nav>

    <main>

    <script>
        // --- 1. 数据结构 ---
        const workData = [
            { company: "GitLab", time: "2024 - 2026", role: "市场数字化营销经理", logo: "GL", desc: "主导大中华区数字化获客体系搭建，操盘SaaS产品全链路GTM策略，通过MarTech工具实现线索转化率提升25%。" },
            { company: "Deep深氪", time: "2022 - 2024", role: "创始人/创业", logo: "DK", desc: "创立营销咨询公司，为多家头部新消费及ToB企业提供全案品牌策划与增长顾问服务，实现从0到1业务闭环。" },
            { company: "千行你我", time: "2021 - 2022", role: "市场品牌总监", logo: "QX", desc: "统筹集团品牌矩阵升级，建立系统化VI体系，策划并执行多场行业级千人峰会，显著提升品牌行业声量。" },
            { company: "MEB美尔贝", time: "2020 - 2021", role: "商业化运营经理", logo: "ME", desc: "负责核心业务线的商业化变现模型搭建，主导双十一等S级全网大促活动，实现GMV同比翻倍增长。" },
            { company: "字节跳动", time: "2019 - 2020", role: "新媒体运营主管", logo: "BD", desc: "负责四川区域官方内容矩阵运营，从0孵化百万级粉丝抖音账号，策划多场城市级整合营销事件。" }
        ];

        const projectsData = [
            { id: 1, category: "新媒体", title: "【字节跳动】四川区域官方抖音矩阵孵化", company: "字节跳动", time: "2019", role: "项目统筹", desc: "从0到1搭建区域账号矩阵，制定内容排期与互动玩法，实现粉丝破百万，打造多条千万级爆款视频。" },
            { id: 2, category: "新媒体", title: "职场垂类IP【万能的小孙】全链路孵化", company: "保密", time: "2020", role: "IP主理人", desc: "全盘操盘IP定位、剧本编导、投流复盘及商业化变现，打造行业现象级职场新媒体账号。" },
            { id: 3, category: "新媒体", title: "汽车垂类个人自媒体账号矩阵独立运营", company: "个人项目", time: "持续", role: "自媒体人", desc: "聚焦二手车与汽车文化，深度测评多款车型，独立完成内容产出、粉丝运营与数据变现。" },
            { id: 4, category: "整合营销", title: "【风味成都】字节跳动城市整合营销", company: "字节跳动", time: "2019", role: "项目统筹", desc: "联动百家本地餐饮品牌及KOL，结合抖音挑战赛打造城市级现象营销，引爆本地生活流量池。" },
            { id: 5, category: "整合营销", title: "【GitLab × 瑞幸咖啡】跨界联名破圈营销", company: "GitLab", time: "2025", role: "营销负责人", desc: "精准洞察程序员群体，实现ToB品牌与ToC消费品牌的巧妙联名，打造话题营销新范式。" },
            { id: 6, category: "整合营销", title: "【MEB美尔贝】全域双十一狂欢节大促", company: "MEB美尔贝", time: "2020", role: "项目经理", desc: "统筹全年最大规模促销节点，打通站内外流量实现品效合一，实现GMV倍增。" },
            { id: 7, category: "品牌营销", title: "华为荣耀《影像情书》情感共鸣TVC营销", company: "千行你我", time: "2021", role: "品牌策划", desc: "以情感化故事赋能科技产品属性，引发社交媒体广泛讨论与共鸣，提升品牌温度。" },
            { id: 8, category: "品牌营销", title: "【觅山】新消费青梅酒品牌全案与GTM", company: "Deep深氪", time: "2022", role: "品牌主理", desc: "全盘操盘品牌定位、VI包装、渠道拓展及营销变现，快速占领年轻女性微醺市场。" },
            { id: 9, category: "市场增长", title: "【GitLab】SaaS产品中国区获客GTM策略", company: "GitLab", time: "2024", role: "营销经理", desc: "搭建基于MarTech的获客模型（AARRR），优化全链路转化，实现CPL显著降低。" },
            { id: 10, category: "市场增长", title: "【GitLab】官网精细化运营与转化率优化", company: "GitLab", time: "2025", role: "营销经理", desc: "主导官网页面重构与A/B测试，大幅提升注册转化与Demo申请率，驱动商机增长。" }
        ];

        // --- 2. 页面与组件渲染 ---
        function switchPage(pageId) {
            window.scrollTo(0,0);
            
            // 控制首页 Canvas 显示状态
            const homeCanvas = document.getElementById('particle-canvas');
            if(pageId === 'home') { 
                homeCanvas.classList.add('active');
            } else {
                homeCanvas.classList.remove('active');
            }

            // 切换页面视图
            document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // 切换导航栏高亮
            document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('active'));
            if(pageId !== 'home') {
                document.getElementById('nav-' + pageId).classList.add('active');
            }
        }

        function renderWork() {
            const container = document.getElementById('work-container');
            container.innerHTML = workData.map(work => `
                <div class="work-item tilt-card">
                    <div class="work-left">
                        <div class="company-logo">${work.logo}</div>
                        <div class="work-info-meta">
                            <div class="work-company-name">${work.company}</div>
                            <div class="work-job-desc">${work.desc}</div>
                        </div>
                    </div>
                    <div class="work-right">
                        <div class="work-pos">${work.role}</div>
                        <div class="work-duration">${work.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderProjects(category = '全部') {
            const grid = document.getElementById('projects-grid');
            const filtered = category === '全部' ? projectsData : projectsData.filter(p => p.category === category);
            grid.innerHTML = filtered.map(p => `
                <div class="project-card tilt-card">
                    <div class="proj-cat">${p.category}</div>
                    <div class="proj-title">${p.title}</div>
                    <div class="proj-intro">${p.desc}</div>
                    <div class="proj-link">了解详情 →</div>
                </div>
            `).join('');
            initTiltEffect();
        }

        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === category);
            });
            renderProjects(category);
        }

        // tvOS 3D 悬浮交互
        function initTiltEffect() {
            document.querySelectorAll('.tilt-card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -4;
                    const rotateY = ((x - centerX) / centerX) * 4;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                });
            });
        }

        // --- 3. 首页星际穿越粒子系统 ---
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleCount = 180; // 粒子数量
        const mouse = { x: null, y: null, radius: 120 };

        window.addEventListener('mousemove', e => {
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });
        window.addEventListener('mouseleave', () => {
            mouse.x = null;
            mouse.y = null;
        });
        window.addEventListener('resize', resizeCanvas);

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.5;
                this.speedX = Math.random() * 0.4 - 0.2;
                this.speedY = Math.random() * 0.4 - 0.2;
                // 颜色配置：让它看起来更像宇宙尘埃
                const colors = ['rgba(255, 255, 255, 0.7)', 'rgba(180, 180, 255, 0.4)', 'rgba(255, 100, 255, 0.2)'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.mass = (Math.random() * 25) + 5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;

                if (this.x > canvas.width) this.x = 0; else if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0; else if (this.y < 0) this.y = canvas.height;

                // 鼠标斥力互动
                if (mouse.x != null && mouse.y != null) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let distance = Math.sqrt(dx * dx + dy * dy);
                    if (distance < mouse.radius) {
                        let forceDirectionX = dx / distance;
                        let forceDirectionY = dy / distance;
                        let force = (mouse.radius - distance) / mouse.radius;
                        this.x -= forceDirectionX * force * this.mass * 0.1;
                        this.y -= forceDirectionY * force * this.mass * 0.1;
                    }
                }
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }
        }

        function initParticles() {
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            // 只有在首页时才更新动画，节省性能
            if (document.getElementById('home').classList.contains('active')) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                for (let i = 0; i < particles.length; i++) {
                    particles[i].update();
                    particles[i].draw();
                }
            }
            requestAnimationFrame(animate);
        }

        // --- 全局初始化 ---
        window.onload = () => {
            renderWork();
            renderProjects();
            resizeCanvas();
            
            // 确保首页 Canvas 默认可见
            canvas.classList.add('active'); 
            animate();
        };

    </script>
</body>
</html>
