<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVID's Space | 空间计算美学</title>
    <style>
        /* 基础与变量配置 - 更深邃的黑与深红紫 */
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --accent-color: #ff00ff; /* 洋红/深红紫 - 用于发光点缀 */
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --glass-hover: rgba(255, 255, 255, 0.07);
            --contact-panel-bg: rgba(20, 0, 20, 0.8); /* 联系面板背景，带一点深紫色调 */
            
            --work-shadow-hover: 0 15px 50px -10px rgba(128, 0, 128, 0.4); /* 工作履历悬停背光 */
            --project-shadow-hover: 0 10px 40px -10px rgba(128, 0, 128, 0.3); /* 项目卡片悬停背光 */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
            line-height: 1.6;
        }

        /* 空间背景 - 模拟参考图的核心发光数据云 */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2;
            overflow: hidden;
        }
        
        .aurora-light {
            position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background: radial-gradient(circle at center, rgba(128, 0, 128, 0.3), transparent 60%),
                        radial-gradient(circle at 10% 90%, rgba(60, 20, 80, 0.3), transparent 40%),
                        radial-gradient(circle at 90% 10%, rgba(20, 50, 100, 0.2), transparent 40%);
            filter: blur(80px);
            animation: aurora-move 20s ease-in-out infinite alternate;
        }

        /* 核心发光体 - 模拟参考图中的亮点 */
        .core-light {
            position: absolute; top: 50%; left: 50%;
            width: 80px; height: 80px;
            background: #ff00ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 150px 60px rgba(255, 0, 255, 0.7);
            filter: blur(10px);
            animation: breath 4s ease-in-out infinite alternate;
            z-index: -1;
        }

        @keyframes aurora-move {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-20px, 20px); }
        }
        @keyframes breath {
            0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
        }

        /* 顶部导航栏 - 新布局逻辑 */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
        }
        .nav-container {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1400px; margin: 0 auto; padding: 20px 40px;
        }
        
        /* 导航栏左侧 Logo */
        .nav-logo {
            font-size: 16px; font-weight: 700; letter-spacing: 0.5px; text-transform: uppercase;
        }

        /* 导航栏中间 页面链接 */
        .nav-links { display: flex; gap: 30px; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none;
            font-size: 14px; font-weight: 500; transition: color 0.3s; cursor: pointer;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }

        /* 导航栏右侧 与我联系 + 弹出面板 */
        .nav-contact-wrapper { position: relative; }
        .nav-contact-trigger {
            color: var(--text-secondary); cursor: pointer;
            font-size: 14px; font-weight: 500; transition: color 0.3s;
        }
        .nav-contact-trigger:hover { color: var(--text-primary); }
        
        /* 弹出联系面板样式 */
        .nav-contact-panel {
            position: absolute; top: calc(100% + 15px); right: 0;
            width: 280px; padding: 20px;
            background: var(--contact-panel-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            opacity: 0; pointer-events: none; visibility: hidden;
            transform: translateY(10px); transition: all 0.3s ease;
            box-shadow: 0 10px 40px -10px rgba(128, 0, 128, 0.3);
        }
        .nav-contact-panel.show {
            opacity: 1; pointer-events: auto; visibility: visible;
            transform: translateY(0);
        }
        .contact-item { display: flex; gap: 12px; align-items: center; margin-bottom: 15px; }
        .contact-item:last-child { margin-bottom: 0; }
        .contact-icon { width: 32px; height: 32px; border-radius: 8px; background: rgba(128, 0, 128, 0.2); display: flex; align-items: center; justify-content: center; color: var(--accent-color); font-weight: bold; }
        .contact-info { font-size: 14px; color: var(--text-primary); }
        .contact-info a { color: var(--text-primary); text-decoration: none; }
        .contact-info a:hover { text-decoration: underline; }

        /* 页面容器 */
        main { padding: 120px 5% 60px; max-width: 1200px; margin: 0 auto; min-height: 100vh; }
        .page-view { display: none; animation: fadeIn 0.6s ease; }
        .page-view.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* 通用：微玻璃拟态卡片 + 呼吸光效 */
        .glass-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative; overflow: hidden;
        }
        /* 鼠标跟随发光效果核心 */
        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(800px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 255, 255, 0.05), transparent 40%);
            opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 0;
        }
        .glass-card:hover::before { opacity: 1; }
        .glass-card > * { position: relative; z-index: 1; }

        /* 页面表头介绍文本样式 */
        .page-header { margin-bottom: 50px; text-align: left; }
        .page-header h2 { font-size: 32px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; }
        .page-header p { font-size: 16px; color: var(--text-secondary); }

        /* 首页视图 - 极简 */
        .hero { height: 70vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 64px; font-weight: 700; margin-bottom: 16px; letter-spacing: -1.5px; }
        .hero p { font-size: 24px; color: var(--text-secondary); font-weight: 300; }

        /* 工作履历视图 - 优化间距与背光 */
        .work-container { padding-top: 10px; }
        .work-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 24px 30px; margin-bottom: 25px; /* 增加行间距 */
            cursor: pointer;
        }
        /* 鼠标悬停背光显现 */
        .work-row:hover { box-shadow: var(--work-shadow-hover); border-color: rgba(128, 0, 128, 0.15); }

        .work-left { display: flex; align-items: center; gap: 20px; flex-grow: 1; }
        .company-logo { width: 48px; height: 48px; border-radius: 12px; background: rgba(128, 0, 128, 0.1); display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--accent-color); font-size: 16px;}
        .work-info { flex-grow: 1; }
        .work-title { font-size: 20px; font-weight: 600; margin-bottom: 4px;}
        .work-desc { font-size: 14px; color: var(--text-secondary); max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s ease; }
        .work-row:hover .work-desc { max-height: 100px; opacity: 1; margin-top: 10px; }

        .work-right { text-align: right; color: var(--text-secondary); flex-shrink: 0; padding-left: 30px;}
        .work-role { font-weight: 500; font-size: 16px; color: var(--text-primary);}
        .work-time { font-size: 14px; opacity: 0.8; }

        /* 项目经验视图 - Bento Grid 优化间距 */
        .projects-controls { margin-bottom: 40px; }
        .filter-bar { display: flex; flex-wrap: wrap; gap: 12px; }
        .filter-btn {
            background: var(--glass-bg); border: 1px solid var(--glass-border); color: var(--text-secondary);
            padding: 8px 20px; border-radius: 30px; cursor: pointer; transition: 0.3s;
            font-size: 14px;
        }
        .filter-btn.active, .filter-btn:hover { background: var(--text-primary); color: var(--bg-color); }

        .bento-grid {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 30px; /* 增加卡片间距 */
        }
        .project-card {
            height: 300px; display: flex; flex-direction: column; cursor: pointer;
            transform-style: preserve-3d; /* 用于视差效果 */
        }
        /* 项目卡片悬停背光 */
        .project-card:hover { box-shadow: var(--project-shadow-hover); border-color: rgba(128, 0, 128, 0.1); }

        .proj-category { font-size: 12px; color: var(--accent-color); font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 1px; }
        .proj-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
        .proj-desc { font-size: 14px; color: var(--text-secondary); flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; line-height: 1.6;}
        .proj-more { align-self: flex-end; font-size: 14px; color: var(--text-primary); display: flex; align-items: center; gap: 4px; opacity: 0; transform: translateX(-10px); transition: 0.3s; padding-top: 10px; }
        .project-card:hover .proj-more { opacity: 1; transform: translateX(0); }

        /* 三级详情页视图 - 保持整体风格 */
        .back-btn { display: inline-block; margin-bottom: 30px; color: var(--text-secondary); cursor: pointer; font-size: 14px; }
        .back-btn:hover { color: var(--text-primary); }
        .detail-header { margin-bottom: 40px; }
        .detail-title { font-size: 40px; margin-bottom: 16px; font-weight: 700;}
        .detail-meta { display: flex; gap: 24px; color: var(--text-secondary); font-size: 16px; margin-bottom: 30px; border-bottom: 1px solid var(--glass-border); padding-bottom: 20px; }
        .detail-content { font-size: 16px; color: #ddd; line-height: 1.8; white-space: pre-line; }

    </style>
</head>

        // --- 2. 交互逻辑区 ---

        // A. 与我联系弹出面板逻辑
        const contactWrapper = document.getElementById('contact-wrapper');
        const contactPanel = document.getElementById('contact-panel');

        contactWrapper.addEventListener('mouseenter', () => {
            contactPanel.classList.add('show');
        });

        // 鼠标彻底离开wrapper区域再隐藏，增加操作宽容度
        contactWrapper.addEventListener('mouseleave', () => {
            contactPanel.classList.remove('show');
        });

        // 如果用户点击了面板内部，点击后隐藏
        contactPanel.addEventListener('click', (e) => {
            if(e.target.tagName === 'A') { // 点击了链接才隐藏
                 contactPanel.classList.remove('show');
            }
        });


        // B. 页面路由与切换
        function switchPage(pageId) {
            window.scrollTo(0,0); // 滚回顶部
            document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // 更新文字导航激活态
            document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('active'));
            if(pageId !== 'project-detail') {
                document.getElementById('nav-' + pageId).classList.add('active');
            } else {
                document.getElementById('nav-projects').classList.add('active');
            }
        }

        // C. 渲染工作履历 (增加行悬停背光效果初始化)
        function renderWork() {
            const container = document.getElementById('work-container');
            container.innerHTML = workData.map(work => `
                <div class="glass-card work-row hover-effect">
                    <div class="work-left">
                        <div class="company-logo">${work.logo}</div>
                        <div class="work-info">
                            <div class="work-title">${work.company}</div>
                            <div class="work-desc">${work.desc}</div>
                        </div>
                    </div>
                    <div class="work-right">
                        <div class="work-role">${work.role}</div>
                        <div class="work-time">${work.time}</div>
                    </div>
                </div>
            `).join('');
        }

        // D. 渲染项目卡片 (优化卡片视差效果初始化)
        function renderProjects(category = '全部') {
            const grid = document.getElementById('projects-grid');
            const filtered = category === '全部' ? projectsData : projectsData.filter(p => p.category === category);
            
            grid.innerHTML = filtered.map(p => `
                <div class="glass-card project-card tilt-card hover-effect" onclick="openDetail(${p.id})">
                    <div class="proj-category">${p.category}</div>
                    <div class="proj-title">${p.title}</div>
                    <div class="proj-desc">${p.desc}</div>
                    <div class="proj-more">了解详情 →</div>
                </div>
            `).join('');

            initHoverLight(); // 初始化微玻璃呼吸光效
            initTiltEffect(); // 初始化tvOS同款视差倾斜
        }

        // E. 项目筛选
        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === category);
            });
            renderProjects(category);
        }

        // F. 打开项目详情
        function openDetail(id) {
            const project = projectsData.find(p => p.id === id);
            if(!project) return;

            document.getElementById('detail-category').innerText = project.category;
            document.getElementById('detail-title').innerText = project.title;
            document.getElementById('detail-time').innerText = "时间: " + project.time;
            document.getElementById('detail-company').innerText = "所在公司: " + project.company;
            document.getElementById('detail-role').innerText = "主要职责: " + project.role;
            document.getElementById('detail-content').innerText = project.detail;

            switchPage('project-detail');
        }

        // G. tvOS 同款 3D 视差倾斜动效 (核心细节)
        function initTiltEffect() {
            document.querySelectorAll('.tilt-card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    const centerX = rect.width / 2;
                    const centerY = rect.height / 2;
                    
                    // 计算倾斜角度，限制在正负8度以内保持丝滑
                    const rotateX = ((y - centerY) / centerY) * -8; 
                    const rotateY = ((x - centerX) / centerX) * 8;
                    
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                });
                card.addEventListener('mouseleave', () => {
                    card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                });
            });
        }

        // H. 微玻璃拟态呼吸光效 (鼠标跟随发光)
        function initHoverLight() {
            document.querySelectorAll('.hover-effect').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left;
                    const y = e.clientY - rect.top;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                });
            });
        }

        // I. 全局初始化
        window.onload = () => {
            renderWork();
            renderProjects();
        };

    </script>
