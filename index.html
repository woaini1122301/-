<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVID's Space | 空间计算美学</title>
    <style>
        /* ================= 基础与变量配置 ================= */
        :root {
            --bg-color: #000000;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --accent-color: #ff00ff; 
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.07);
            --contact-panel-bg: rgba(10, 10, 15, 0.95); 
            
            /* 卡片悬停时的呼吸背光 */
            --work-shadow-hover: 0 15px 50px -10px rgba(128, 0, 128, 0.3); 
            --project-shadow-hover: 0 10px 40px -10px rgba(128, 0, 128, 0.2); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Helvetica Neue", sans-serif;
            line-height: 1.6;
        }

        /* ================= 空间背景与特效层 ================= */
        /* 极光背景层 (最底层) */
        .aurora-bg {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -3; /* 垫底 */
            background: #000000;
            overflow: hidden;
        }
        .aurora-light {
            position: absolute; width: 150%; height: 150%; top: -25%; left: -25%;
            background: radial-gradient(circle at center, rgba(60, 0, 100, 0.15), transparent 60%),
                        radial-gradient(circle at 90% 10%, rgba(20, 40, 100, 0.1), transparent 40%);
            filter: blur(80px);
            animation: aurora-move 20s ease-in-out infinite alternate;
        }
        @keyframes aurora-move {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.05) translate(-15px, 15px); }
        }

        /* 核心 Canvas：高密度星云粒子层 */
        #particle-nebula {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            z-index: -2; /* 位于极光之上，内容之下 */
            opacity: 0; transition: opacity 0.8s ease; /* 页面切换时的淡入淡出 */
            pointer-events: auto; /* 允许捕获鼠标事件 */
        }
        #particle-nebula.active { opacity: 1; }

        /* ================= 顶部导航栏 ================= */
        nav {
            position: fixed; top: 0; width: 100%; z-index: 100;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .nav-container {
            display: flex; justify-content: space-between; align-items: center;
            max-width: 1400px; margin: 0 auto; padding: 18px 40px; 
        }
        
        .nav-logo {
            font-size: 15px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: all 0.3s ease; color: rgba(255,255,255,0.8);
        }
        .nav-logo:hover { text-shadow: 0 0 15px rgba(255, 255, 255, 0.7); color: #fff; }

        .nav-links { display: flex; gap: 35px; }
        .nav-links a {
            color: var(--text-secondary); text-decoration: none;
            font-size: 14px; font-weight: 500; transition: all 0.3s ease; cursor: pointer;
            position: relative; padding: 4px 0;
        }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        .nav-links a::after {
            content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px;
            background-color: var(--text-primary); transition: width 0.3s ease;
        }
        .nav-links a.active::after { width: 100%; }

        .nav-contact-wrapper { position: relative; }
        .nav-contact-trigger {
            color: var(--text-secondary); cursor: pointer; font-size: 14px; font-weight: 500; 
            transition: color 0.3s; padding: 5px 10px; border-radius: 4px;
        }
        .nav-contact-trigger:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
        
        .nav-contact-panel {
            position: absolute; top: calc(100% + 15px); right: 0; width: 280px; padding: 25px;
            background: var(--contact-panel-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            opacity: 0; pointer-events: none; visibility: hidden;
            transform: translateY(10px); transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 15px 50px -10px rgba(0, 0, 0, 0.8);
        }
        .nav-contact-panel.show { opacity: 1; pointer-events: auto; visibility: visible; transform: translateY(0); }
        .contact-item { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; }
        .contact-item:last-child { margin-bottom: 0; }
        .contact-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(128, 0, 128, 0.15); border: 1px solid rgba(128, 0, 128, 0.2); display: flex; align-items: center; justify-content: center; color: #cc66ff; font-size: 12px; font-weight: bold; }
        .contact-info { font-size: 14px; color: var(--text-primary); text-align: left; }
        .contact-info div { color: var(--text-secondary); font-size: 12px; margin-bottom: 2px; }
        .contact-info a { color: var(--text-primary); text-decoration: none; transition: color 0.3s; }
        .contact-info a:hover { text-decoration: underline; color: #cc66ff; }

        /* ================= 页面视图容器 ================= */
        /* 【极限压缩顶部空白】：将 padding-top 从 90px 压缩到了 75px，紧贴导航栏底部 */
        main { padding: 75px 5% 60px; max-width: 1250px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 10; }
        .page-view { display: none; }
        .page-view.active { display: block; animation: fadeIn 0.6s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 通用微玻璃拟态卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.015); border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px; padding: 35px;
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            transition: box-shadow 0.4s, border-color 0.4s, background 0.4s, transform 0.1s;
            position: relative; overflow: hidden;
        }
        /* 卡片内鼠标发光 */
        .glass-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(200, 100, 255, 0.06), transparent 40%);
            opacity: 0; transition: opacity 0.5s ease; pointer-events: none; z-index: 0;
        }
        .glass-card:hover::before { opacity: 1; }
        .glass-card > * { position: relative; z-index: 1; }

        /* 二级页面通用居中表头 - 去除多余空隙 */
        .page-header-centered { 
            margin-bottom: 35px; /* 紧凑下方间距 */
            margin-top: 0; 
            text-align: center; 
            display: flex; flex-direction: column; align-items: center; 
        }
        .page-header-centered h2 { font-size: 38px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; background: linear-gradient(180deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header-centered p { font-size: 15px; color: var(--text-secondary); max-width: 650px; font-weight: 300; line-height: 1.8; }

        /* ================= 首页视图 ================= */
        .hero-home { height: 85vh; display: flex; align-items: center; justify-content: center; pointer-events: none; }

        /* ================= 工作履历视图 ================= */
        .work-row {
            display: flex; align-items: center; justify-content: space-between;
            padding: 28px 35px; margin-bottom: 20px; cursor: pointer;
        }
        .work-row:hover { 
            box-shadow: var(--work-shadow-hover); border-color: rgba(200, 100, 255, 0.15); 
            background: rgba(255,255,255,0.025); transform: translateY(-2px);
        }
        .work-left { display: flex; align-items: center; gap: 25px; flex-grow: 1; }
        .company-logo { width: 50px; height: 50px; border-radius: 12px; background: rgba(128, 0, 128, 0.05); border: 1px solid rgba(128, 0, 128, 0.1); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #cc66ff; font-size: 16px;}
        .work-info { flex-grow: 1; text-align: left; }
        .work-title { font-size: 19px; font-weight: 600; margin-bottom: 6px; color: #fff; }
        .work-desc { font-size: 14px; color: var(--text-secondary); max-height: 0; opacity: 0; overflow: hidden; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); font-weight: 300; }
        .work-row:hover .work-desc { max-height: 100px; opacity: 1; margin-top: 10px; }
        .work-right { text-align: right; color: var(--text-secondary); flex-shrink: 0; padding-left: 40px;}
        .work-role { font-weight: 500; font-size: 15px; color: var(--text-primary); margin-bottom: 4px; }
        .work-time { font-size: 13px; opacity: 0.7; font-weight: 300; }

        /* ================= 项目经验视图 ================= */
        .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 40px; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); }
        .filter-btn {
            background: transparent; border: none; color: var(--text-secondary);
            padding: 8px 24px; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; font-size: 14px; font-weight: 500;
        }
        .filter-btn:hover { color: var(--text-primary); }
        .filter-btn.active { background: rgba(255,255,255,0.08); color: var(--text-primary); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .project-card { height: 320px; display: flex; flex-direction: column; cursor: pointer; transform-style: preserve-3d; text-align: left; }
        .project-card:hover { 
            box-shadow: var(--project-shadow-hover); border-color: rgba(200, 100, 255, 0.1); 
            background: rgba(255,255,255,0.025); transform: translateY(-3px);
        }
        .proj-category { font-size: 12px; color: #cc66ff; font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1.5px; }
        .proj-title { font-size: 19px; font-weight: 600; margin-bottom: 15px; color: #fff; line-height: 1.4; }
        .proj-desc { font-size: 14px; color: var(--text-secondary); flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; line-height: 1.7; font-weight: 300; }
        .proj-more { align-self: flex-end; font-size: 13px; color: var(--text-primary); display: flex; align-items: center; gap: 6px; opacity: 0; transform: translateX(-10px); transition: all 0.3s ease; padding-top: 15px; font-weight: 500; }
        .project-card:hover .proj-more { opacity: 1; transform: translateX(0); }

        /* ================= 三级详情页视图 ================= */
        .back-btn { display: inline-block; margin-bottom: 40px; color: var(--text-secondary); cursor: pointer; font-size: 14px; transition: color 0.3s; font-weight: 500; }
        .back-btn:hover { color: var(--text-primary); }
        .detail-header { margin-bottom: 40px; text-align: center; }
        .detail-title { font-size: 40px; margin-bottom: 18px; font-weight: 700; color: #fff; letter-spacing: -1px; line-height: 1.2;}
        .detail-meta { display: flex; gap: 30px; color: var(--text-secondary); font-size: 15px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 25px; justify-content: center; font-weight: 300; }
        .detail-meta span strong { color: rgba(255,255,255,0.9); font-weight: 500; margin-right: 5px; }
        .detail-content { font-size: 16px; color: #eaeaea; line-height: 1.9; white-space: pre-line; font-weight: 300; max-width: 900px; margin: 0 auto; text-align: left; }

    </style>
</head>

        ];

        // ================= 交互与路由逻辑 =================
        const contactWrapper = document.getElementById('contact-wrapper');
        const contactPanel = document.getElementById('contact-panel');
        contactWrapper.addEventListener('mouseenter', () => contactPanel.classList.add('show'));
        contactWrapper.addEventListener('mouseleave', () => contactPanel.classList.remove('show'));
        contactPanel.addEventListener('click', (e) => { if(e.target.tagName === 'A') contactPanel.classList.remove('show'); });

        // 页面切换与画布淡入淡出逻辑
        function switchPage(pageId) {
            window.scrollTo({ top: 0, behavior: 'smooth' }); // 平滑滚动到顶部
            
            // 切换 Canvas 的可见性
            const nebulaCanvas = document.getElementById('particle-nebula');
            if(pageId === 'home') {
                nebulaCanvas.classList.add('active');
            } else {
                nebulaCanvas.classList.remove('active');
            }

            // 切换主页面容器
            document.querySelectorAll('.page-view').forEach(el => el.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // 切换文字导航条高亮
            document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('active'));
            if(pageId === 'work') document.getElementById('nav-work').classList.add('active');
            if(pageId === 'projects' || pageId === 'project-detail') document.getElementById('nav-projects').classList.add('active');
        }

        // ================= 内容渲染 =================
        function renderWork() {
            const container = document.getElementById('work-container');
            container.innerHTML = workData.map(work => `
                <div class="glass-card work-row hover-effect tilt-card">
                    <div class="work-left">
                        <div class="company-logo">${work.logo}</div>
                        <div class="work-info">
                            <div class="work-title">${work.company}</div>
                            <div class="work-desc">${work.desc}</div>
                        </div>
                    </div>
                    <div class="work-right">
                        <div class="work-role">${work.role}</div>
                        <div class="work-time">${work.time}</div>
                    </div>
                </div>
            `).join('');
        }

        function renderProjects(category = '全部') {
            const grid = document.getElementById('projects-grid');
            const filtered = category === '全部' ? projectsData : projectsData.filter(p => p.category === category);
            
            grid.innerHTML = filtered.map(p => `
                <div class="glass-card project-card tilt-card hover-effect" onclick="openDetail(${p.id})">
                    <div class="proj-category">${p.category}</div>
                    <div class="proj-title">${p.title}</div>
                    <div class="proj-desc">${p.desc}</div>
                    <div class="proj-more">查看案例详情 →</div>
                </div>
            `).join('');
            
            // 每次重新渲染后，必须重新绑定动效
            initHoverLight(); 
            initTiltEffect();
        }

        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.innerText === category) { btn.classList.add('active'); } 
                else { btn.classList.remove('active'); }
            });
            renderProjects(category);
        }

        function openDetail(id) {
            const project = projectsData.find(p => p.id === id);
            if(!project) return;
            document.getElementById('detail-category').innerText = project.category;
            document.getElementById('detail-title').innerText = project.title;
            document.querySelector('#detail-time .val').innerText = project.time;
            document.querySelector('#detail-company .val').innerText = project.company;
            document.querySelector('#detail-role .val').innerText = project.role;
            document.getElementById('detail-content').innerText = project.detail;
            switchPage('project-detail');
        }

        // ================= 3D 卡片与发光交互 =================
        function initTiltEffect() {
            document.querySelectorAll('.tilt-card').forEach(card => {
                // 确保每次绑定前清除旧的监听，防止叠加
                card.onmousemove = null;
                card.onmouseleave = null;
                
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left, y = e.clientY - rect.top;
                    const centerX = rect.width / 2, centerY = rect.height / 2;
                    const rotateX = ((y - centerY) / centerY) * -5; 
                    const rotateY = ((x - centerX) / centerX) * 5;
                    card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;
                });
                card.addEventListener('mouseleave', () => card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`);
            });
        }

        function initHoverLight() {
            document.querySelectorAll('.hover-effect').forEach(card => {
                card.onmousemove = e => {
                    const rect = card.getBoundingClientRect();
                    card.style.setProperty('--mouse-x', `${e.clientX - rect.left}px`);
                    card.style.setProperty('--mouse-y', `${e.clientY - rect.top}px`);
                };
            });
        }

        // ================= 核心：浩瀚粒子星云特效 =================
        function initParticleNebula() {
            const canvas = document.getElementById('particle-nebula');
            const ctx = canvas.getContext('2d');
            let width, height;
            let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;

            function resizeCanvas() {
                width = canvas.width = window.innerWidth;
                height = canvas.height = window.innerHeight;
                initParticles(); 
            }
            window.addEventListener('resize', resizeCanvas);
            window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

            const particles = [];
            const numParticles = 1500; // 极高密度
            
            class Particle {
                constructor() { this.init(); }
                init() {
                    const theta = Math.random() * 2 * Math.PI; 
                    const radius = Math.pow(Math.random(), 2) * width * 1.2; 
                    
                    this.rawX = radius * Math.cos(theta);
                    this.rawY = (Math.random() * 2 - 1) * height * 0.8; 
                    this.rawZ = Math.random() * width * 1.5 - width * 0.5; 
                    this.size = Math.random() * 2.5 + 0.5; 
                    
                    const colors = [
                        'rgba(200, 100, 255, ', 'rgba(255, 100, 255, ', 
                        'rgba(100, 150, 255, ', 'rgba(255, 255, 255, '  
                    ];
                    this.colorPrefix = colors[Math.floor(Math.random() * colors.length)];
                    this.speed = Math.random() * 0.0005 + 0.0001; 
                }

                update(time) {
                    const angle = time * this.speed;
                    const cosA = Math.cos(angle);
                    const sinA = Math.sin(angle);
                    
                    const x = this.rawX * cosA - this.rawZ * sinA;
                    const z = this.rawX * sinA + this.rawZ * cosA;
                    const y = this.rawY;

                    const tilt = 0.5;
                    const tiltedY = y * Math.cos(tilt) - z * Math.sin(tilt);
                    const tiltedZ = y * Math.sin(tilt) + z * Math.cos(tilt);

                    const fov = width * 0.8; 
                    const scale = fov / (fov + tiltedZ);
                    
                    const centerX = width * 0.7; 
                    const centerY = height * 0.6;
                    this.px = centerX + x * scale;
                    this.py = centerY + tiltedY * scale;

                    this.finalSize = this.size * scale;
                    this.alpha = Math.max(0.1, Math.min(0.9, scale * 0.7)); 

                    // 鼠标交互景深对焦
                    const dx = this.px - mouseX;
                    const dy = this.py - mouseY;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const intersectRadius = 150; 
                    
                    if (dist < intersectRadius) {
                        const force = (intersectRadius - dist) / intersectRadius;
                        this.alpha += force * 0.3;
                        this.finalSize *= (1 + force * 0.2);
                    }
                }

                draw() {
                    ctx.beginPath();
                    ctx.arc(this.px, this.py, this.finalSize, 0, Math.PI * 2);
                    ctx.fillStyle = this.colorPrefix + this.alpha + ')';
                    ctx.fill();
                }
            }

            function initParticles() {
                particles.length = 0; 
                for (let i = 0; i < numParticles; i++) particles.push(new Particle());
            }

            resizeCanvas(); 
            
            let time = 0;
            function renderNebula() {
                // 【性能优化】：只有在首页（画布设为可见状态）时才进行昂贵的粒子计算与重绘
                if (document.getElementById('home').classList.contains('active')) {
                    ctx.clearRect(0, 0, width, height); 
                    time++; 
                    for (let i = 0; i < particles.length; i++) {
                        particles[i].update(time);
                        particles[i].draw();
                    }
                }
                requestAnimationFrame(renderNebula);
            }
            renderNebula();
        }

        // ================= 生命周期初始化 =================
        window.onload = () => {
            renderWork();
            renderProjects();
            
            // 初次加载特效绑定
            initHoverLight(); 
            initTiltEffect(); 
            
            // 确保首页 Canvas 默认激活
            document.getElementById('particle-nebula').classList.add('active');
            initParticleNebula(); 
        };

    </script>
