<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVID's Space | 项目经验</title>
    <style>
        :root {
            --bg-color: #000000; --text-primary: #ffffff; --text-secondary: rgba(255, 255, 255, 0.65);
            --accent-color: #ffcc00; --glass-bg: rgba(255, 255, 255, 0.015); --glass-border: rgba(255, 255, 255, 0.06);
            --contact-panel-bg: rgba(10, 10, 15, 0.95); 
            --project-shadow-hover: 0 10px 40px -10px rgba(255, 204, 0, 0.15); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-primary); overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; }

        .aurora-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; background: #000000; overflow: hidden; }
        .aurora-light { position: absolute; width: 150%; height: 150%; top: -25%; left: -25%; background: radial-gradient(circle at center, rgba(100, 50, 0, 0.15), transparent 60%), radial-gradient(circle at 90% 10%, rgba(80, 30, 0, 0.1), transparent 40%); filter: blur(80px); animation: aurora-move 20s ease-in-out infinite alternate; }
        @keyframes aurora-move { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.05) translate(-15px, 15px); } }

        nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; padding: 18px 40px; }
        .nav-logo a { font-size: 15px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; color: rgba(255,255,255,0.8); transition: 0.3s ease; }
        .nav-logo a:hover { text-shadow: 0 0 15px rgba(255, 204, 0, 0.7); color: #fff; }

        .nav-links { display: flex; gap: 35px; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.3s; position: relative; padding: 4px 0; }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        .nav-links a::after { content: ''; position: absolute; bottom: 0; left: 0; width: 0; height: 1px; background-color: var(--accent-color); transition: 0.3s; }
        .nav-links a.active::after { width: 100%; }

        .nav-contact-wrapper { position: relative; }
        .nav-contact-trigger { color: var(--text-secondary); cursor: pointer; font-size: 14px; font-weight: 500; transition: 0.3s; padding: 5px 10px; border-radius: 4px; }
        .nav-contact-trigger:hover { color: var(--text-primary); background: rgba(255,255,255,0.03); }
        .nav-contact-panel { position: absolute; top: calc(100% + 15px); right: 0; width: 280px; padding: 25px; background: var(--contact-panel-bg); border: 1px solid rgba(255,255,255,0.06); border-radius: 16px; backdrop-filter: blur(20px); opacity: 0; pointer-events: none; transform: translateY(10px); transition: all 0.4s; box-shadow: 0 15px 50px -10px rgba(0, 0, 0, 0.8); }
        .nav-contact-panel.show { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .contact-item { display: flex; gap: 15px; align-items: center; margin-bottom: 20px; }
        .contact-item:last-child { margin-bottom: 0; }
        .contact-icon { width: 36px; height: 36px; border-radius: 8px; background: rgba(255, 204, 0, 0.15); border: 1px solid rgba(255, 204, 0, 0.2); display: flex; align-items: center; justify-content: center; color: var(--accent-color); font-size: 12px; font-weight: bold; }
        .contact-info { font-size: 14px; color: var(--text-primary); text-align: left; }
        .contact-info div { color: var(--text-secondary); font-size: 12px; margin-bottom: 2px; }
        .contact-info a { color: var(--text-primary); text-decoration: none; transition: 0.3s; }
        .contact-info a:hover { text-decoration: underline; color: var(--accent-color); }

        main { padding: 90px 5% 60px; max-width: 1250px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 10; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 35px; backdrop-filter: blur(25px); transition: box-shadow 0.4s, border-color 0.4s, background 0.4s, transform 0.1s; position: relative; overflow: hidden; }
        .glass-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(600px circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255, 204, 0, 0.06), transparent 40%); opacity: 0; transition: opacity 0.5s; pointer-events: none; z-index: 0; }
        .glass-card:hover::before { opacity: 1; }
        .glass-card > * { position: relative; z-index: 1; }

        .page-header-centered { margin-top: 15px; margin-bottom: 35px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .page-header-centered h2 { font-size: 38px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; background: linear-gradient(180deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header-centered p { font-size: 15px; color: var(--text-secondary); max-width: 650px; font-weight: 300; line-height: 1.8; }

        .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 40px; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); }
        .filter-btn { background: transparent; border: none; color: var(--text-secondary); padding: 8px 24px; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; font-size: 14px; font-weight: 500; }
        .filter-btn:hover { color: var(--text-primary); }
        .filter-btn.active { background: rgba(255,255,255,0.08); color: var(--accent-color); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .project-card { height: 320px; display: flex; flex-direction: column; cursor: pointer; transform-style: preserve-3d; text-align: left;}
        .project-card:hover { box-shadow: var(--project-shadow-hover); border-color: rgba(255, 204, 0, 0.1); background: rgba(255,255,255,0.025); transform: translateY(-3px); }
        .proj-category { font-size: 12px; color: var(--accent-color); font-weight: 600; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1.5px; }
        .proj-title { font-size: 19px; font-weight: 600; margin-bottom: 15px; color: #fff; line-height: 1.4; }
        .proj-desc { font-size: 14px; color: var(--text-secondary); flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; line-height: 1.7; font-weight: 300; }
        .proj-more { align-self: flex-end; font-size: 13px; color: var(--text-primary); display: flex; align-items: center; gap: 6px; opacity: 0; transform: translateX(-10px); transition: all 0.3s ease; padding-top: 15px; font-weight: 500; }
        .project-card:hover .proj-more { opacity: 1; transform: translateX(0); }

        /* 详情页视图 (内部切换) */
        #project-detail { display: none; }
        .back-btn { display: inline-block; margin-bottom: 40px; color: var(--text-secondary); cursor: pointer; font-size: 14px; transition: color 0.3s; font-weight: 500; }
        .back-btn:hover { color: var(--text-primary); }
        .detail-header { margin-bottom: 40px; text-align: center; }
        .detail-title { font-size: 40px; margin-bottom: 18px; font-weight: 700; color: #fff; letter-spacing: -1px; line-height: 1.2;}
        .detail-meta { display: flex; gap: 30px; color: var(--text-secondary); font-size: 15px; margin-bottom: 30px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 25px; justify-content: center; font-weight: 300; }
        .detail-meta span strong { color: var(--accent-color); font-weight: 500; margin-right: 5px; }
        .detail-content { font-size: 16px; color: #eaeaea; line-height: 1.9; white-space: pre-line; font-weight: 300; max-width: 900px; margin: 0 auto; text-align: left;}
    </style>
</head>
<body>

    <div class="aurora-bg"><div class="aurora-light"></div></div>

    <nav>
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html">DAVID's Space</a></div>
            <div class="nav-links">
                <a href="work.html">工作履历</a>
                <a href="projects.html" class="active">项目经验</a>
            </div>
            <div class="nav-contact-wrapper" id="contact-wrapper">
                <a class="nav-contact-trigger">与我联系</a>
                <div class="nav-contact-panel" id="contact-panel">
                    <div class="contact-item">
                        <div class="contact-icon">Mail</div>
                        <div class="contact-info">
                            <div>官方邮件</div><a href="mailto:david@email.com">david@email.com</a> 
                        </div>
                    </div>
                    <div class="contact-item">
                        <div class="contact-icon">Phone</div>
                        <div class="contact-info">
                            <div>移动电话</div><a href="tel:13800000000">+86 138 0000 0000</a> 
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main>
        <div id="projects-list-container">
            <div class="page-header-centered">
                <h2>项目经验</h2>
                <p>精选全链条实战案例，涵盖新媒体IP孵化、整合营销策划、品牌全案及数字化增长策略。</p>
            </div>
            <div class="filter-bar" id="filter-container">
                <button class="filter-btn active" onclick="filterProjects('全部')">全部</button>
                <button class="filter-btn" onclick="filterProjects('新媒体')">新媒体</button>
                <button class="filter-btn" onclick="filterProjects('整合营销')">整合营销</button>
                <button class="filter-btn" onclick="filterProjects('品牌营销')">品牌营销</button>
                <button class="filter-btn" onclick="filterProjects('市场增长')">市场增长</button>
            </div>
            <div class="bento-grid" id="projects-grid"></div>
        </div>

        <div id="project-detail">
            <div class="back-btn" onclick="closeDetail()">← 返回项目列表</div>
            <div class="glass-card detail-card" style="padding: 60px;">
                <div class="detail-header">
                    <div class="proj-category" id="detail-category">分类</div>
                    <h1 class="detail-title" id="detail-title">标题</h1>
                    <div class="detail-meta">
                        <span id="detail-time"><strong>时间</strong> <span class="val"></span></span>
                        <span id="detail-company"><strong>所在公司</strong> <span class="val"></span></span>
                        <span id="detail-role"><strong>核心职责</strong> <span class="val"></span></span>
                    </div>
                </div>
                <div class="detail-content" id="detail-content">内容加载中...</div>
            </div>
        </div>
    </main>

    <script>
        const projectsData = [
            { id: 1, category: "新媒体", title: "【字节跳动】四川区域官方抖音矩阵孵化与运营全案", company: "字节跳动", time: "2019", role: "项目统筹", desc: "从0到1搭建区域账号矩阵体系，制定内容排期与互动玩法，实现百万粉丝跨越。", detail: "【项目背景】大厂区域下沉战略推进，需要建立强有力的本地化内容发声渠道与商业化引流入口。\n【核心职责】负责四川区域官方抖音号及头条号矩阵搭建、人设IP编导、日常运营、数据复盘及商业化变现探索。\n【项目成果】粉丝矩阵突破百万，单条爆款视频播放量破千万，显著提升了大厂在本地的品牌声量与业务渗透率。" },
            { id: 2, category: "新媒体", title: "职场垂类IP【万能的小孙】抖音从0到1商业化孵化", company: "保密", time: "2020", role: "IP主理人", desc: "从人设定位、剧本编导到投流复盘，实现短视频IP从0到1的粉丝沉淀与商业化变现。", detail: "在此部分可以补充具体的IP定位思路、冷启动阶段的精准人设打造（短视频+直播），千川投流策略及粉丝转化路径细节。" },
            { id: 3, category: "整合营销", title: "【风味成都】字节跳动城市级整合营销事件統筹", company: "字节跳动", time: "2019", role: "项目统筹", desc: "联动百家本地餐饮品牌及KOL，结合抖音挑战赛打造城市级现象营销。", detail: "统筹项目整体策划与执行：联动本地餐饮协会、头部餐饮品牌、抖音达人挑战赛、线下快闪打卡等多元玩法，驱动品效合一，单次活动曝光突破亿级。" },
            { id: 4, category: "整合营销", title: "【GitLab×瑞幸咖啡】ToB与ToC跨界联名品牌破圈营销", company: "GitLab", time: "2025", role: "营销负责人", desc: "精准洞察程序员群体，实现ToB品牌与ToC消费品牌的巧妙联名与话题营销。", detail: "【跨界逻辑】代码与咖啡是程序员的日常。通过联名杯套、定制周边及技术Webinar，实现品牌破圈与声量增长详情。" },
            { id: 5, category: "品牌营销", title: "华为荣耀《影像情书》情感共鸣TVC品牌营销全案", company: "千行你我", time: "2021", role: "品牌策划", desc: "以情感化故事赋能科技产品属性，引发社交媒体广泛讨论与共鸣。", detail: "在此部分可以补充关于TVC核心脚本大纲、情感化营销策略制定及全网宣发排期详情。" },
            { id: 6, category: "品牌营销", title: "【觅山】新消费青梅酒品牌全案：从0到1的商业化变现", company: "Deep深氪", time: "2022", role: "品牌主理", desc: "全盘操盘新消费品牌：从品牌命名、VI包装、GTM策略到全域营销变现。", detail: "全链路从0操盘新消费品牌：定位针对年轻女性微醺经济，通过天猫/京东/抖音电商渠道布局，KOL种草及投流运营，实现品类破局与GMV达成详情。" },
            { id: 7, category: "市场增长", title: "【GitLab】SaaS产品中国区获客GTM策略与全链路数字化增长", company: "GitLab", time: "2024", role: "营销经理", desc: "搭建全链路获客体系（AARRR），操盘中国区GTM，驱动官网线索与商机增长。", detail: "【项目背景】GitLab进入中国市场，需要构建强有力的获客漏斗。\n【核心职责】负责GitLab中国区市场策略搭建，覆盖获客、激活、留存、变现。具体包括MarTech工具链整合、Webinar系列运营、SEO/SEM优化、核心大客户 ABM营销策略等。详情见此部分。" },
            { id: 8, category: "市场增长", title: "【MEB美尔贝】医美平台双十一全网狂欢节商业化大促", company: "MEB美尔贝", time: "2020", role: "项目经理", desc: "统筹全年最大规模促销节点，打通站内外流量实现品效合一，GMV同比倍增。", detail: "全盘负责医美平台商业化运营和大促策划，统筹产品、运营、市场资源。核心职责包括双十一全周期GMV分解与目标达成规划，站内用户全生命周期增长模型搭建，KOL矩阵投流复盘及 GMV 最终达标。详情见此部分。" }
        ];

        document.getElementById('contact-wrapper').addEventListener('mouseenter', () => document.getElementById('contact-panel').classList.add('show'));
        document.getElementById('contact-wrapper').addEventListener('mouseleave', () => document.getElementById('contact-panel').classList.remove('show'));

        function renderProjects(category = '全部') {
            const grid = document.getElementById('projects-grid');
            const filtered = category === '全部' ? projectsData : projectsData.filter(p => p.category === category);
            
            grid.innerHTML = filtered.map(p => `
                <div class="glass-card project-card tilt-card hover-effect" onclick="openDetail(${p.id})">
                    <div class="proj-category">${p.category}</div>
                    <div class="proj-title">${p.title}</div>
                    <div class="proj-desc">${p.desc}</div>
                    <div class="proj-more">查看案例详情 →</div>
                </div>
            `).join('');

            bindCardEffects();
        }

        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.innerText === category) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderProjects(category);
        }

        function openDetail(id) {
            const project = projectsData.find(p => p.id === id);
            if(!project) return;
            document.getElementById('detail-category').innerText = project.category;
            document.getElementById('detail-title').innerText = project.title;
            document.querySelector('#detail-time .val').innerText = project.time;
            document.querySelector('#detail-company .val').innerText = project.company;
            document.querySelector('#detail-role .val').innerText = project.role;
            document.getElementById('detail-content').innerText = project.detail;
            
            document.getElementById('projects-list-container').style.display = 'none';
            document.getElementById('project-detail').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeDetail() {
            document.getElementById('project-detail').style.display = 'none';
            document.getElementById('projects-list-container').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function bindCardEffects() {
            document.querySelectorAll('.tilt-card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left, y = e.clientY - rect.top;
                    card.style.transform = `perspective(1000px) rotateX(${((y - rect.height / 2) / (rect.height / 2)) * -6}deg) rotateY(${((x - rect.width / 2) / (rect.width / 2)) * 6}deg) scale3d(1.02, 1.02, 1.02)`;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                });
                card.addEventListener('mouseleave', () => card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`);
            });
        }

        window.onload = () => { renderProjects(); };
    </script>
</body>
</html>
