<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVID's Space | 项目经验</title>
    <style>
        :root {
            --bg-color: #000000; --text-primary: #ffffff; --text-secondary: rgba(255, 255, 255, 0.65);
            --accent-color: #ffcc00; --glass-bg: rgba(255, 255, 255, 0.015); --glass-border: rgba(255, 255, 255, 0.06);
            --contact-panel-bg: rgba(10, 10, 15, 0.95); 
            --project-shadow-hover: 0 10px 40px -10px rgba(255, 204, 0, 0.15); 
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-primary); overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif; line-height: 1.6; }

        .aurora-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; background: #000000; overflow: hidden; }
        .aurora-light { position: absolute; width: 150%; height: 150%; top: -25%; left: -25%; background: radial-gradient(circle at center, rgba(100, 50, 0, 0.15), transparent 60%), radial-gradient(circle at 90% 10%, rgba(80, 30, 0, 0.1), transparent 40%); filter: blur(80px); animation: aurora-move 20s ease-in-out infinite alternate; }
        @keyframes aurora-move { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.05) translate(-15px, 15px); } }

        nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; padding: 18px 40px; }
        .nav-logo a { font-size: 15px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; color: rgba(255,255,255,0.8); transition: 0.3s ease; }
        .nav-links { display: flex; gap: 35px; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.3s; position: relative; padding: 4px 0; }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        .nav-links a.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background-color: var(--accent-color); }

        main { padding: 90px 5% 60px; max-width: 1250px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 10; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .page-header-centered { margin-top: 15px; margin-bottom: 35px; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .page-header-centered h2 { font-size: 38px; font-weight: 700; margin-bottom: 12px; letter-spacing: -0.5px; background: linear-gradient(180deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .page-header-centered p { font-size: 15px; color: var(--text-secondary); max-width: 650px; font-weight: 300; line-height: 1.8; }

        .filter-bar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 40px; background: rgba(255,255,255,0.03); padding: 6px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); }
        .filter-btn { background: transparent; border: none; color: var(--text-secondary); padding: 8px 24px; border-radius: 30px; cursor: pointer; transition: all 0.3s ease; font-size: 14px; font-weight: 500; }
        .filter-btn.active { background: rgba(255,255,255,0.08); color: var(--accent-color); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .bento-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 25px; }
        .project-card { height: 320px; display: flex; flex-direction: column; cursor: pointer; text-align: left; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; transition: all 0.4s; }
        .project-card:hover { box-shadow: var(--project-shadow-hover); border-color: rgba(255, 204, 0, 0.15); background: rgba(255,255,255,0.025); transform: translateY(-3px); }
        .proj-category { font-size: 11px; color: var(--accent-color); font-weight: 600; margin-bottom: 12px; text-transform: uppercase; letter-spacing: 2px; }
        .proj-title { font-size: 18px; font-weight: 600; margin-bottom: 12px; color: #fff; line-height: 1.4; }
        .proj-desc { font-size: 13.5px; color: var(--text-secondary); flex-grow: 1; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; line-height: 1.7; font-weight: 300; }
        .proj-more { align-self: flex-end; font-size: 12px; color: var(--text-primary); display: flex; align-items: center; gap: 6px; opacity: 0; transform: translateX(-10px); transition: all 0.3s ease; padding-top: 15px; }
        .project-card:hover .proj-more { opacity: 1; transform: translateX(0); }

        /* --- 详情页：论文/商业报告级排版 --- */
        #project-detail { display: none; }
        .back-btn { display: inline-block; margin-bottom: 30px; color: var(--text-secondary); cursor: pointer; font-size: 14px; transition: 0.3s; }
        .back-btn:hover { color: #fff; }
        .detail-header { margin-bottom: 50px; text-align: center; }
        .detail-title { font-size: 40px; font-weight: 700; color: #fff; margin-bottom: 25px; letter-spacing: -1px; line-height: 1.2; }
        .detail-meta { display: flex; flex-wrap: wrap; justify-content: center; gap: 40px; border-bottom: 1px solid rgba(255,255,255,0.06); padding-bottom: 30px; margin-bottom: 40px; }
        .detail-meta span { color: var(--text-secondary); font-size: 15px; }
        .detail-meta strong { color: var(--accent-color); font-weight: 500; margin-right: 8px; }

        .detail-content { max-width: 950px; margin: 0 auto; text-align: left; line-height: 2.2; color: #eaeaea; font-weight: 300; font-size: 16px; }
        .detail-content h3 { color: var(--accent-color); font-size: 24px; margin: 50px 0 25px; font-weight: 600; border-left: 5px solid var(--accent-color); padding-left: 20px; background: linear-gradient(90deg, rgba(255,204,0,0.05), transparent); }
        .detail-content p { margin-bottom: 25px; }
        .detail-content strong { color: #fff; font-weight: 600; background: rgba(255,204,0,0.1); padding: 0 4px; border-radius: 4px; }
        .detail-content ul { margin: 25px 0 40px; padding-left: 25px; }
        .detail-content li { margin-bottom: 15px; list-style: square; color: #ddd; }
        .highlight-box { background: rgba(255, 204, 0, 0.04); border: 1px solid rgba(255, 204, 0, 0.1); border-radius: 16px; padding: 30px; margin: 40px 0; }
    </style>
</head>
<body>

    <div class="aurora-bg"><div class="aurora-light"></div></div>

    <nav>
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html">DAVID's Space</a></div>
            <div class="nav-links">
                <a href="about.html">关于我</a>
                <a href="portfolio.html">作品集</a>
                <a href="work.html">工作履历</a>
                <a href="projects.html" class="active">项目经验</a>

    </nav>

    <main>
        <div id="projects-list-container">
            <div class="page-header-centered">
                <h2>项目经验</h2>
                <p>精选 29 个全链路实战案例，涵盖数字化增长、品牌全案及 IP 孵化等核心领域。</p>
            </div>
            <div class="filter-bar" id="filter-container">
                <button class="filter-btn active" onclick="filterProjects('全部')">全部</button>
                <button class="filter-btn" onclick="filterProjects('整合营销')">整合营销</button>
                <button class="filter-btn" onclick="filterProjects('品牌运营')">品牌运营</button>
                <button class="filter-btn" onclick="filterProjects('市场增长')">市场增长</button>
                <button class="filter-btn" onclick="filterProjects('新媒体')">新媒体</button>
            </div>
            <div class="bento-grid" id="projects-grid"></div>
        </div>

        <div id="project-detail">
            <div class="back-btn" onclick="closeDetail()">← 返回项目列表</div>
            <div class="glass-card detail-card" style="padding: 60px;">
                <div class="detail-header">
                    <div class="proj-category" id="detail-category"></div>
                    <h1 class="detail-title" id="detail-title"></h1>
                    <div class="detail-meta">
                        <span id="detail-time"></span>
                        <span id="detail-company"></span>
                        <span id="detail-role"></span>
                    </div>
                </div>
                <div class="detail-content" id="detail-content"></div>
            </div>
        </div>
    </main>

    <script>
        const projectsData = [
            // ================= 整合营销 (8个) =================
            { 
                id: 1, category: "整合营销", title: "【风味成都】抖音城市级现象营销事件策划", company: "字节跳动", time: "2019", role: "项目统筹", 
                desc: "深度挖掘成都地域文化基因，联动百余家餐饮品牌与头部KOL，引爆城市级话题声量。", 
                detail: `<h3>项目背景：从品牌发声到生意增长</h3>成都作为字节跳动全国战略重镇，在国庆黄金周节点面临着“如何将城市热度转化为实际商机”的挑战。我们策划的《风味成都》，不仅是为了曝光，更是为了建立一套“城市即秀场”的生意逻辑，刺激 B 端广告主预算投入，并拉升本地生活交易闭环。
                <h3>核心执行动作：打造城市级流量黑洞</h3>
                1. **电影感内容矩阵**：联合成都老字号餐饮（盘飧市、陈麻婆等）及地标（IFS、宽窄巷子），拍摄了 12 部极具质感的纪录片式 TVC，将“安逸生活”与抖音“记录美好”深度绑定。
                2. **双链路闭环设计**：线上发起 #风味成都 挑战赛，利用定制 AR 滤镜引导全民参与二创；线下策划“打卡路书”，用户需在指定商圈完成 5 处打卡，即可领取联名周边。
                3. **资源饱和攻击**：整合成都双流、天府国际机场大屏及天府软件园电梯媒体，实现 100% 覆盖。
                <h3>项目成果与荣誉</h3>活动斩获 **3.1 亿+ 全网曝光量**。成功吸引超过 **100 家** 区域广告主进行增量投放，带来百万级广告消耗增长。项目荣获 **2020 年广告门最佳社会营销奖**。`
            },
            { 
                id: 2, category: "整合营销", title: "【代码与咖啡】GitLab × 瑞幸咖啡：ToB 跨界联名破圈全案", company: "GitLab", time: "2024", role: "营销负责人", 
                desc: "精准洞察程序员群体，实现 ToB 科技品牌与大众消费品牌的跨界联名，驱动新产品线冷启动。", 
                detail: `<h3>跨界逻辑：构建“硬核效率”与“情绪慰藉”的共鸣</h3>GitLab（代码托管）与 Luckin（咖啡）是程序员日常生活的两大刚需。瑞幸作为我们的既有客户，正处于品牌流量巅峰。我们借由新 SaaS 产品上市，旨在通过联名降低 ToB 品牌的严肃感，精准截流程序员私域。
                <h3>核心策略：软件园“精准捕鱼”</h3>
                1. **线下阵地截流**：在全国 5 大核心软件园（如北京西二旗、上海张江、成都天府软件园）建立快闪店和视觉展陈，实现“低成本、高纯度”的受众曝光。
                2. **权益钩子设计**：用户扫码试用 GitLab 新产品，即可领取“瑞幸 9.9 元咖啡券”。通过这一轻量化动效，解决了 ToB 产品 Demo 申请门槛过高的痛点。
                3. **私域激活**：流量直接导入 GitLab 官方私域群，由技术专家进行针对性的产品演示与引导。
                <h3>数据成效</h3>活动期间，新产品 Demo 申请量环比提升 **140%**。单周私域社群净增精准粉丝超 **1.2 万人**。该案例成功验证了 ToB 品牌通过 C 端生活场景降维打击的极高效率。`
            },
            { 
                id: 3, category: "整合营销", title: "【今日宜】西打酒：新锐酒饮从 0 到 1 的 GTM 全渠道推广", company: "独立项目", time: "2023", role: "营销主理", 
                desc: "针对年轻群体“情绪饮酒”趋势，制定从人群洞察到全渠道动销的整合方案。", 
                detail: `<h3>行业洞察：Z 世代的“去酒文化”潮流</h3>通过大数据发现，年轻人饮酒动机从“社交应酬”转向“自我疗愈”。我们将【今日宜】西打酒定义为“都市独居青年的情绪伙伴”。
                <h3>全链路上市方案拆解</h3>
                1. **视觉语言重塑**：打破传统圆瓶设计，采用方正清冷的几何感设计，迎合当下审美红利，让产品本身具备“自传播”属性。
                2. **内容矩阵渗透**：在小红书打造 #今日宜独处、#今日宜自愈 话题，联合 50 位调性博主，不卖参数，只卖“下班后的那一刻”。
                3. **渠道协同动销**：采取“线上声量占领，线下精准收割”模式，通过抖音本地生活将流量引向精品餐酒吧。
                <h3>最终业绩</h3>上市仅三个月，今日宜即冲入西打酒品类销量前十。实现了高客单价、高复购率的品牌冷启动。`
            },
            { 
                id: 4, category: "整合营销", title: "泸州老窖“高光”品牌年度传播：定义新中产轻奢白酒", company: "千行你我", time: "2021", role: "项目统筹", 
                desc: "作为泸州老窖第三增长曲线，针对新中产人群打造“轻奢主义”白酒品牌。", 
                detail: `<h3>传播课题：满足新中产的“审美红利”</h3>作为泸州老窖的战略级产品，“高光”面临的挑战是如何在大厂背景下做出一款不像“老干部酒”的新派白酒。
                <h3>具体执行路径</h3>
                1. **跨界联动破圈**：联合 **MINI 汽车** 发起“出逃两日”主题自驾，将白酒融入艺术与自驾生活场景。
                2. **媒体调性锚定**：与 **GQ 实验室** 深度合作，以极具共情力的内容引发情感共鸣，带出产品的轻奢审美。
                3. **会员深度运营**：建立“高光精英俱乐部”，通过线下私密品鉴晚宴，实现核心种子用户的裂变。
                <h3>复盘总结</h3>成功助力“高光”成为高端光瓶酒赛道的领导品牌。为泸州老窖有效拓展了 25-35 岁这一断档的核心消费客群。`
            },
            { 
                id: 5, category: "整合营销", title: "“叫叫学院”小红书专项增长：创意雷达内容营销全案", company: "辰木互动", time: "2020", role: "营销策划", 
                desc: "针对在线教育赛道，利用独家“创意雷达”系统，精准触达母婴受众。", 
                detail: `<h3>项目背景：如何在母婴蓝海中实现低成本获客？</h3>叫叫学院作为儿童阅读领导者，需要在小红书这一母婴品牌必争之地，以极高效率换取高质量线索。
                <h3>核心方法论：独家“创意雷达”策划系统</h3>我们开发了创意雷达模型，深挖产品 6 大差异化特色：
                1. **痛点置换**：将“阅读难”置换为“培养孩子的思考力”，直击家长心智。
                2. **KOL/KOC 蜂窝矩阵**：针对不同年龄段宝妈，定制“真实反馈型”、“场景构造型”笔记，形成刷屏效应。
                3. **数据驱动迭代**：基于搜索趋势图，提前三个月卡位核心关键词，抢占自然流量红利。
                <h3>成效复盘</h3>在 10 月份单月搜索量同比增长 **321%**。2020 全年笔记发布同比增长 **400%**。成功建立起“叫叫 = 专业阅读辅导”的母婴圈层心智。`
            },
            { 
                id: 6, category: "整合营销", title: "新疆喀纳斯“神秘阿勒泰”：目的地现象级营销全案", company: "文旅项目", time: "2021", role: "项目策划", 
                desc: "策划现象级文旅方案，利用雪场场景与社交媒体联动，驱动流量双爆发。", 
                detail: `<h3>愿景：将阿勒泰打造为中国滑雪界的“麦加”</h3>阿勒泰资源极佳但感知偏远。我们致力于通过视觉美学，助力传统文旅产业的数字化变革。
                <h3>核心执行逻辑：视觉营销 + 游戏跨界</h3>
                1. **美图秀秀定制化**：联合美图秀秀定制“阿勒泰之蓝”专属滤镜，利用女性用户打卡刚需，驱动社交媒体大规模拍照裂变。
                2. **腾讯游戏联名**：发掘喀纳斯神秘图腾文化，与腾讯游戏打造虚拟现实结合的“打卡路书”。
                3. **KOL 实地溯源**：邀请户外垂类博主输出高质量视觉大片，彻底改变大众对新疆冬季“苦寒”的认知。
                <h3>最终成果</h3>全网曝光量突破 **3 亿次**。阿勒泰雪场单季客流量爆发式增长 **120%**。项目荣获 **2020 广告门最佳社会营销奖**。`
            },
            { 
                id: 7, category: "整合营销", title: "思念食品“新年儿童养成计划”节日营销", company: "独立项目", time: "2021", role: "策划", 
                desc: "以“儿童成长”为情感切入点，提升品牌在家庭消费场景的情感链接。", 
                detail: "负责春节节点营销，通过内容植入与互动玩法，深度渗透家庭年货消费场景。以“成长”为钩子，将产品转化为节庆情感纽带，提升品牌认知度。" 
            },
            { 
                id: 8, category: "整合营销", title: "UBRAS 品牌线上全链路整合营销方案", company: "独立项目", time: "2021", role: "策划", 
                desc: "深度参与知名内衣品牌数字化增长，优化全路径 ROI 实现品效合一。", 
                detail: "优化社交媒体种草到电商转化的链路。通过对人群包的精细化拆解与素材的 A/B 测试，实现了品效合一的高转化回馈。" 
            },

            // ================= 品牌运营 (7个) =================
            { 
                id: 9, category: "品牌运营", title: "【觅山】新消费青梅酒：从 0 到 1 商业化变现全案", company: "Deep深氪", time: "2022", role: "品牌主理", 
                desc: "定位年轻女性微醺经济，主导视觉美学与全域营销闭环，实现品牌高溢价占位。", 
                detail: `<h3>底层策略：构建属于都市人的“山野叙事”</h3>在新消费赛道，我们通过人群画像建模锁定审美敏感群体。确立“年轻化、去酒文化化”的视觉表达。
                <h3>核心行动路径</h3>

        // 渲染与交互逻辑
        function renderProjects(category = '全部') {
            const grid = document.getElementById('projects-grid');
            let displayData = [];
            if (category === '全部') {
                const groups = {};
                projectsData.forEach(p => { if (!groups[p.category]) groups[p.category] = []; groups[p.category].push(p); });
                let index = 0, hasMore = true;
                const keys = ['整合营销', '品牌运营', '市场增长', '新媒体'];
                while (hasMore) {
                    hasMore = false;
                    for (let key of keys) { if (groups[key] && index < groups[key].length) { displayData.push(groups[key][index]); hasMore = true; } }
                    index++;
                }
            } else { displayData = projectsData.filter(p => p.category === category); }
            grid.innerHTML = displayData.map(p => `
                <div class="glass-card project-card hover-effect" onclick="openDetail(${p.id})">
                    <div class="proj-category">${p.category}</div>
                    <div class="proj-title">${p.title}</div>
                    <div class="proj-desc">${p.desc}</div>
                    <div class="proj-more">查看案例详情 →</div>
                </div>
            `).join('');
        }

        function openDetail(id) {
            const project = projectsData.find(p => p.id === id);
            if(!project) return;
            document.getElementById('detail-category').innerText = project.category;
            document.getElementById('detail-title').innerText = project.title;
            document.getElementById('detail-time').innerHTML = `<strong>时间</strong> ${project.time}`;
            document.getElementById('detail-company').innerHTML = `<strong>主体</strong> ${project.company}`;
            document.getElementById('detail-role').innerHTML = `<strong>角色</strong> ${project.role}`;
            document.getElementById('detail-content').innerHTML = project.detail;
            document.getElementById('projects-list-container').style.display = 'none';
            document.getElementById('project-detail').style.display = 'block';
            window.scrollTo(0,0);
        }

        function closeDetail() {
            document.getElementById('project-detail').style.display = 'none';
            document.getElementById('projects-list-container').style.display = 'block';
            window.scrollTo(0,0);
        }

        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.toggle('active', btn.innerText === category));
            renderProjects(category);
        }

        window.onload = () => renderProjects();
    </script>
