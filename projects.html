        // 【轮询算法：点击"全部"时，分类错开展示】
        function renderProjects(category = '全部') {
            const grid = document.getElementById('projects-grid');
            let displayData = [];

            if (category === '全部') {
                const groups = {};
                projectsData.forEach(p => {
                    if (!groups[p.category]) groups[p.category] = [];
                    groups[p.category].push(p);
                });
                
                let index = 0;
                let hasMore = true;
                // 轮询数组顺序
                const keys = ['整合营销', '品牌运营', '市场增长', '新媒体'];
                
                while (hasMore) {
                    hasMore = false;
                    for (let key of keys) {
                        if (groups[key] && index < groups[key].length) {
                            displayData.push(groups[key][index]);
                            hasMore = true;
                        }
                    }
                    index++;
                }
            } else {
                displayData = projectsData.filter(p => p.category === category);
            }
            
            grid.innerHTML = displayData.map(p => `
                <div class="glass-card project-card tilt-card hover-effect" onclick="openDetail(${p.id})">
                    <div class="proj-category">${p.category}</div>
                    <div class="proj-title">${p.title}</div>
                    <div class="proj-desc">${p.desc}</div>
                    <div class="proj-more">查看案例详情 →</div>
                </div>
            `).join('');

            bindCardEffects();
        }

        function filterProjects(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                if(btn.innerText === category) btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderProjects(category);
        }

        function openDetail(id) {
            const project = projectsData.find(p => p.id === id);
            if(!project) return;
            document.getElementById('detail-category').innerText = project.category;
            document.getElementById('detail-title').innerText = project.title;
            document.querySelector('#detail-time .val').innerText = project.time;
            document.querySelector('#detail-company .val').innerText = project.company;
            document.querySelector('#detail-role .val').innerText = project.role;
            document.getElementById('detail-content').innerText = project.detail;
            
            document.getElementById('projects-list-container').style.display = 'none';
            document.getElementById('project-detail').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function closeDetail() {
            document.getElementById('project-detail').style.display = 'none';
            document.getElementById('projects-list-container').style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function bindCardEffects() {
            document.querySelectorAll('.tilt-card').forEach(card => {
                card.addEventListener('mousemove', e => {
                    const rect = card.getBoundingClientRect();
                    const x = e.clientX - rect.left, y = e.clientY - rect.top;
                    card.style.transform = `perspective(1000px) rotateX(${((y - rect.height / 2) / (rect.height / 2)) * -6}deg) rotateY(${((x - rect.width / 2) / (rect.width / 2)) * 6}deg) scale3d(1.02, 1.02, 1.02)`;
                    card.style.setProperty('--mouse-x', `${x}px`);
                    card.style.setProperty('--mouse-y', `${y}px`);
                });
                card.addEventListener('mouseleave', () => card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`);
            });
        }

        window.onload = () => { renderProjects(); };
