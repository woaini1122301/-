<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVID's Space | 关于我</title>
    <style>
        :root {
            --bg-color: #000000; --text-primary: #ffffff; --text-secondary: rgba(255, 255, 255, 0.65);
            --accent-color: #ffcc00; --glass-bg: rgba(255, 255, 255, 0.015); --glass-border: rgba(255, 255, 255, 0.06);
            --terminal-bg: #0a0a0c; --terminal-green: #00ff41;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-primary); overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; }
        .aurora-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; background: #000; overflow: hidden; }
        .aurora-light { position: absolute; width: 150%; height: 150%; top: -25%; left: -25%; background: radial-gradient(circle at center, rgba(100, 50, 0, 0.15), transparent 60%); filter: blur(80px); animation: aurora-move 20s infinite alternate; }
        @keyframes aurora-move { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.05) translate(-15px, 15px); } }

        nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .nav-container { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; max-width: 1400px; margin: 0 auto; padding: 18px 40px; }
        .nav-logo { justify-self: start; }
        .nav-logo a { font-size: 15px; font-weight: 700; color: #eee; text-decoration: none; }
        .nav-links { justify-self: center; display: flex; gap: 35px; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; transition: 0.3s; padding: 4px 0; position: relative; }
        .nav-links a.active { color: var(--text-primary); }
        .nav-links a.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background-color: var(--accent-color); }
        .nav-contact-wrapper { justify-self: end; color: var(--text-secondary); font-size: 14px; }

        main { padding: 110px 5% 60px; max-width: 1250px; margin: 0 auto; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; backdrop-filter: blur(25px); }
        .bento-grid { display: grid; grid-template-columns: 320px 1fr; gap: 25px; }
        .profile-card { grid-row: span 2; align-items: center; text-align: center; }
        .avatar-box { width: 140px; height: 140px; border-radius: 50%; border: 2px solid rgba(255,204,0,0.3); margin-bottom: 25px; overflow: hidden; display: flex; justify-content: center; align-items: center; background: #111; }
        .avatar-box img { width: 100%; height: 100%; object-fit: cover; }
        .profile-location { font-size: 14px; color: var(--accent-color); margin-bottom: 25px; }
        .profile-quote { font-size: 14px; color: var(--text-secondary); font-style: italic; line-height: 1.8; }

        .skills-card { display: flex; flex-direction: row; padding: 0; overflow: hidden; height: 350px; }
        .skills-tags-area { flex: 1.2; padding: 25px; display: flex; flex-wrap: wrap; gap: 10px; align-content: flex-start; }
        .skill-tag { flex-grow: 1; min-width: 80px; text-align: center; padding: 8px 12px; border-radius: 6px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); font-size: 13px; color: var(--text-secondary); cursor: pointer; transition: 0.3s; }
        .skill-tag:hover, .skill-tag.active { border-color: var(--accent-color); color: var(--accent-color); background: rgba(255,204,0,0.1); }
        .terminal-area { flex: 1; background: var(--terminal-bg); border-left: 1px solid var(--glass-border); display: flex; flex-direction: column; }
        .term-body { padding: 20px; flex: 1; font-family: monospace; font-size: 13px; color: var(--terminal-green); line-height: 1.6; }

        .info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 25px; grid-column: 2; }
        .edu-item { display: flex; gap: 15px; align-items: center; }
        .edu-logo { width: 50px; height: 50px; border-radius: 50%; background: #fff; padding: 5px; }
        .edu-school { font-size: 19px; font-weight: 700; color: #fff; }
        .edu-badge { font-size: 10px; color: var(--accent-color); border: 1px solid var(--accent-color); padding: 2px 6px; border-radius: 4px; margin-left: 10px; }
        .interest-list { display: flex; flex-direction: column; gap: 12px; }
        .interest-item { display: flex; align-items: center; gap: 15px; font-size: 14px; color: var(--text-secondary); }
        .interest-icon { width: 30px; height: 30px; background: rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
    </style>
</head>
<body>
    <div class="aurora-bg"><div class="aurora-light"></div></div>
    <nav>
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html">DAVID's Space</a></div>
            <div class="nav-links">
                <a href="about.html" class="active">关于我</a>
                <a href="portfolio.html">作品集</a>
                <a href="work.html">工作履历</a>
                <a href="projects.html">项目经验</a>
            </div>
            <div class="nav-contact-wrapper">与我联系: david@email.com</div>
        </div>
    </nav>
    <main>
        <div class="bento-grid">
            <div class="glass-card profile-card">
                <div class="avatar-box"><img src="./images/avatar.png" onerror="this.src='https://ui-avatars.com/api/?name=DK&background=ffcc00&color=000'"></div>
                <h2>David Kang</h2>
                <div class="profile-location">◎ 四川 · 成都</div>
                <div class="profile-quote">“以严谨的逻辑构建生活基本盘，以极客的敏锐探索商业新边界；在自律中追求自由，持续迭代，做自己人生的超级个体。”</div>
            </div>
            <div class="glass-card skills-card">
                <div class="skills-tags-area" id="tags-container"></div>
                <div class="terminal-area">
                    <div class="term-body" id="term-text">>> System initialized... Click tags for analysis.</div>
                </div>
            </div>
            <div class="info-row">
                <div class="glass-card" style="justify-content:center;">
                    <div class="edu-item">
                        <div class="edu-logo"><img src="./images/sau_logo.png" onerror="this.style.display='none'"></div>
                        <div><span class="edu-school">四川农业大学</span><span class="edu-badge">211院校</span><div style="font-size:13px; color:var(--text-secondary)">广告学 + 产品设计</div></div>
                    </div>
                </div>
                <div class="glass-card">
                    <div class="interest-list">
                        <div class="interest-item"><div class="interest-icon">🏎️</div>资深汽车爱好者，测评挖掘质感好车</div>
                        <div class="interest-item"><div class="interest-icon">🏂</div>滑雪发烧友，追求速度与重力的平衡</div>
                        <div class="interest-item"><div class="interest-icon">🍳</div>烹饪精研，享受食材重组的秩序感</div>
                        <div class="interest-item"><div class="interest-icon">🪴</div>绿植美学，在都市构建微型生态</div>
                        <div class="interest-item"><div class="interest-icon">🪚</div>木工制作，沉迷手工打磨的纯粹专注</div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script>
        const skills = ["数据分析", "整合营销", "品牌运营", "新媒体运营", "市场公关", "文案", "线上获客", "SEM", "SEO", "团队管理", "产品设计", "用户运营", "网站运营", "品牌策划", "媒介资源", "广告策划", "TVC", "B2B", "B2C", "渠道运营", "异业合作"];
        const container = document.getElementById('tags-container');
        const term = document.getElementById('term-text');
        skills.forEach(s => {
            const div = document.createElement('div'); div.className = 'skill-tag'; div.innerText = s;
            div.onclick = () => { term.innerText = `>> Analyzing module [${s}]...\n>> 具备该领域资深实战经验，支持全链路商业目标达成与方法论沉淀。`; };
            container.appendChild(div);
        });
    </script>
</body>
</html>
