<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVID's Space | 作品集</title>
    <style>
        :root {
            --bg-color: #000000; --text-primary: #ffffff; --text-secondary: rgba(255, 255, 255, 0.65);
            --accent-color: #ffcc00; --glass-bg: rgba(255, 255, 255, 0.015); --glass-border: rgba(255, 255, 255, 0.06);
            --contact-panel-bg: rgba(10, 10, 15, 0.95); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-primary); overflow-x: hidden; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; line-height: 1.6; }

        .aurora-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; background: #000000; overflow: hidden; }
        .aurora-light { position: absolute; width: 150%; height: 150%; top: -25%; left: -25%; background: radial-gradient(circle at center, rgba(100, 50, 0, 0.15), transparent 60%), radial-gradient(circle at 90% 10%, rgba(80, 30, 0, 0.1), transparent 40%); filter: blur(80px); animation: aurora-move 20s ease-in-out infinite alternate; }
        @keyframes aurora-move { 0% { transform: scale(1) translate(0, 0); } 100% { transform: scale(1.05) translate(-15px, 15px); } }

        /* 导航栏：Grid实现绝对居中 */
        nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .nav-container { 
            display: grid; 
            grid-template-columns: 1fr auto 1fr; 
            align-items: center; 
            max-width: 1400px; 
            margin: 0 auto; 
            padding: 18px 40px; 
        }
        .nav-logo { justify-self: start; }
        .nav-logo a { font-size: 15px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; color: rgba(255,255,255,0.8); transition: 0.3s; }
        
        .nav-links { justify-self: center; display: flex; gap: 35px; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; font-weight: 500; transition: 0.3s; position: relative; padding: 4px 0; }
        .nav-links a:hover, .nav-links a.active { color: var(--text-primary); }
        .nav-links a.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 1px; background-color: var(--accent-color); }

        .nav-placeholder { justify-self: end; font-size: 14px; color: var(--text-secondary); }

        /* 主体容器放宽至 1350px，给 4 个卡片充足的空间 */
        main { padding: 110px 5% 60px; max-width: 1350px; margin: 0 auto; min-height: 100vh; position: relative; z-index: 10; animation: fadeIn 0.6s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .page-header { text-align: center; margin-bottom: 40px; }
        .page-header h2 { font-size: 38px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(180deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 50px; flex-wrap: wrap; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: var(--text-secondary); padding: 8px 24px; border-radius: 30px; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .filter-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
        .filter-btn.active { background: var(--accent-color); color: #000; font-weight: 600; border-color: var(--accent-color); }

        /* 作品网格：强制一行四个，并防溢出撑爆 */
        .bento-grid { 
            display: grid; 
            grid-template-columns: repeat(4, minmax(0, 1fr)); 
            gap: 20px; 
            width: 100%;
        }
        
        .portfolio-card { 
            background: var(--glass-bg); 
            border: 1px solid var(--glass-border); 
            border-radius: 20px; 
            padding: 18px; 
            cursor: pointer; 
            transition: 0.4s; 
            backdrop-filter: blur(20px); 
            text-align: left; 
            height: 380px; 
            display: flex; 
            flex-direction: column; 
            min-width: 0; /* 绝对防止文字过长撑爆Grid轨道 */
        }
        .portfolio-card:hover { transform: translateY(-5px); border-color: rgba(255, 204, 0, 0.3); box-shadow: 0 10px 40px -10px rgba(255, 204, 0, 0.2); background: rgba(255,255,255,0.03); }
        
        /* 封面图 */
        .card-cover { width: 100%; height: 160px; border-radius: 12px; margin-bottom: 18px; overflow: hidden; background: rgba(255,255,255,0.03); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .card-cover img { width: 100%; height: 100%; object-fit: cover; }
        .card-cover-placeholder { color: rgba(255,255,255,0.2); font-size: 12px; letter-spacing: 2px; }

        .work-tag { font-size: 11px; color: var(--accent-color); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .work-tag::before { content: ''; width: 6px; height: 6px; background: var(--accent-color); border-radius: 50%; box-shadow: 0 0 10px var(--accent-color); }
        .work-title { font-size: 16px; font-weight: 700; color: #fff; margin-bottom: 10px; line-height: 1.4; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%; }
        .work-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; flex-grow: 1; }

        /* 响应式保护：小屏幕自动折行 */
        @media (max-width: 1200px) {
            .bento-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
        }
        @media (max-width: 900px) {
            .bento-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        }
        @media (max-width: 600px) {
            .bento-grid { grid-template-columns: 1fr; }
        }

        /* 详情页样式 */
        #work-detail { display: none; }
        .back-btn { display: inline-block; margin-bottom: 30px; color: var(--text-secondary); cursor: pointer; font-size: 14px; }
        .detail-card { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; padding: 60px; backdrop-filter: blur(30px); }
        .detail-header { text-align: center; margin-bottom: 40px; }
        .detail-title { font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 20px; }
        
        .media-preview-box { width: 100%; max-width: 800px; margin: 30px auto; border-radius: 20px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.08); display: flex; flex-direction: column; align-items: center; padding: 50px 30px; text-align: center; }
        .play-icon { width: 70px; height: 70px; background: var(--accent-color); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; box-shadow: 0 0 30px rgba(255, 204, 0, 0.3); }
        .play-icon::after { content: ''; border-left: 18px solid #000; border-top: 11px solid transparent; border-bottom: 11px solid transparent; margin-left: 5px; }
        .xhs-icon { width: 70px; height: 70px; background: #ff2442; border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; color: #fff; font-weight: 900; font-size: 24px; }
        .ppt-icon { width: 70px; height: 70px; background: #d04423; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 25px; color: #fff; font-weight: 900; font-size: 24px; }
        
        .action-btn { background: #fff; color: #000; padding: 14px 40px; border-radius: 40px; text-decoration: none; font-weight: 700; font-size: 15px; transition: 0.3s; display: inline-block; margin-top: 20px; }
        .action-btn:hover { transform: scale(1.05); box-shadow: 0 0 25px rgba(255,255,255,0.3); }
        
        .detail-body { max-width: 850px; margin: 50px auto 0; line-height: 2.1; color: #ddd; font-weight: 300; font-size: 16px; }
        .detail-body h3 { color: var(--accent-color); margin: 40px 0 15px; font-size: 22px; border-left: 4px solid var(--accent-color); padding-left: 15px; }
    </style>
</head>

        function filterPortfolio(category) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText === category);
            });
            const grid = document.getElementById('portfolio-grid');
            const filteredData = category === '全部' ? portfolioData : portfolioData.filter(d => d.category === category);
            grid.innerHTML = filteredData.map(w => `
                <div class="portfolio-card" onclick="openDetail(${w.id})">
                    <div class="card-cover">
                        <img src="${w.cover}" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex'">
                        <div class="card-cover-placeholder" style="display:none; width:100%; height:100%; align-items:center; justify-content:center; flex-direction:column; gap:10px;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
                            <span>NO IMAGE</span>
                        </div>
                    </div>
                    <div class="work-tag">${w.category}</div>
                    <div class="work-title" title="${w.title}">${w.title}</div>
                    <div class="work-desc">${w.desc}</div>
                </div>
            `).join('');
        }

                        <div class="play-icon"></div>

                        <a href="${item.link}" target="_blank" class="action-btn">立即前往观看视频</a>
                    </div>`;

                mediaBox.innerHTML = `
                    <div class="media-preview-box">

            } else {
                mediaBox.innerHTML = `
                    <div class="media-preview-box">
                        <div class="ppt-icon">PDF</div>
                        <p style="margin-bottom:20px; color:#aaa; font-size:14px;">策划案受保护，如需查看完整版请联系我获取提取码</p>
                        <a href="mailto:david@email.com" class="action-btn" style="background:var(--accent-color); color:#000; border:none;">申请查看完整方案</a>
                    </div>`;
            }
            document.getElementById('list-container').style.display = 'none';
            document.getElementById('work-detail').style.display = 'block';
            window.scrollTo({top:0, behavior:'smooth'});
        }

        function closeDetail() {
            document.getElementById('work-detail').style.display = 'none';
            document.getElementById('list-container').style.display = 'block';
        }

        window.onload = () => filterPortfolio('全部');
    </script>
</body>
</html>
