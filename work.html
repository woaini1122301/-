<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAVID's Space | 工作履历</title>
    <style>
        :root {
            --bg-color: #000000; --text-primary: #ffffff; --text-secondary: rgba(255, 255, 255, 0.65);
            --accent-color: #ffcc00; --glass-bg: rgba(255, 255, 255, 0.015); --glass-border: rgba(255, 255, 255, 0.06);
            --work-shadow-hover: 0 15px 50px -10px rgba(255, 204, 0, 0.25); 
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg-color); color: var(--text-primary); font-family: -apple-system, BlinkMacSystemFont, sans-serif; line-height: 1.6; }
        .aurora-bg { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -3; background: #000; }
        .aurora-light { position: absolute; width: 150%; height: 150%; top: -25%; left: -25%; background: radial-gradient(circle at center, rgba(100, 50, 0, 0.15), transparent 60%); filter: blur(80px); animation: move 20s infinite alternate; }
        @keyframes move { 100% { transform: translate(-15px, 15px); } }

        nav { position: fixed; top: 0; width: 100%; z-index: 100; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(25px); border-bottom: 1px solid rgba(255,255,255,0.04); }
        .nav-container { display: flex; justify-content: space-between; align-items: center; max-width: 1400px; margin: 0 auto; padding: 18px 40px; }
        .nav-logo a { font-size: 15px; font-weight: 700; color: #eee; text-decoration: none; }
        .nav-links { display: flex; gap: 35px; }
        .nav-links a { color: var(--text-secondary); text-decoration: none; font-size: 14px; transition: 0.3s; }
        .nav-links a.active { color: var(--text-primary); }

        main { padding: 110px 5% 60px; max-width: 1250px; margin: 0 auto; }
        .page-header { text-align: center; margin-bottom: 50px; }
        .page-header h2 { font-size: 38px; font-weight: 700; margin-bottom: 10px; background: linear-gradient(180deg, #fff, #aaa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        .work-row { background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 20px; padding: 25px 35px; margin-bottom: 20px; display: flex; justify-content: space-between; cursor: pointer; transition: 0.4s; }
        .work-row:hover { background: rgba(255,255,255,0.03); border-color: var(--accent-color); transform: translateY(-2px); }
        
        .company-logo { width: 50px; height: 50px; border-radius: 12px; background: rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-right: 25px; }
        .company-logo img { width: 75%; height: 75%; object-fit: contain; }
        
        .work-title { font-size: 19px; font-weight: 600; color: #fff; }
        .work-short { font-size: 13px; color: rgba(255,255,255,0.4); margin-bottom: 8px; }
        .work-desc { font-size: 14px; color: var(--text-secondary); max-height: 0; opacity: 0; overflow: hidden; transition: 0.5s; white-space: pre-line; }
        .work-row:hover .work-desc { max-height: 1000px; opacity: 1; margin-top: 15px; }
        
        .work-right { text-align: right; }
        .work-role { font-weight: 500; font-size: 15px; color: var(--text-primary); }
        .work-time { font-size: 13px; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="aurora-bg"><div class="aurora-light"></div></div>
    <nav>
        <div class="nav-container">
            <div class="nav-logo"><a href="index.html">DAVID's Space</a></div>
            <div class="nav-links">
                <a href="about.html">关于我</a>
                <a href="portfolio.html">作品集</a>
                <a href="work.html" class="active">工作履历</a>
                <a href="projects.html">项目经验</a>
            </div>
        </div>
    </nav>
    <main>
        <div class="page-header"><h2>工作履历</h2><p>全链路营销操盘，覆盖大厂、创业及 SaaS 增长实战。</p></div>
        <div id="work-container"></div>
    </main>
    <script>
        const data = [
            { company: "GitLab", short: "全球领先的开源一体化 DevSecOps 平台", role: "市场数字化营销经理", time: "2024 - 2026", logo: "./logo/gitlab.png", desc: "1、增长与商业化变现 (ARR +500%)\n2、官网运营与转化率优化 (CVR +47%)\n3、品牌运营与内容生态 (曝光 3000W+)\n4、公关危机与声誉管理" },
            { company: "Deep深氪", short: "线上整合营销咨询创业项目", role: "个人创业", time: "2022 - 2024", logo: "./logo/deep.png", desc: "1、平台运营搭建，引入100+优质产品\n2、制定品牌年度营销策略，孵化【GAO’s AUTO SHOW】\n3、新媒体运营操盘，跑通全网商业闭环" },
            { company: "千行你我", short: "聚焦新消费与高端商业的综合性品牌管理集团", role: "市场品牌总监", time: "2021 - 2022", logo: "./logo/qianxing.png", desc: "1、品牌架构与全案GTM，主导迪士尼月饼、高光上市\n2、搭建营销中台，提升组织 ROI\n3、利用跨界联动低成本撬动高倍率品牌曝光" },
            { company: "MEB美尔贝", short: "国内领先的医美消费与产业互联网服务平台", role: "商业化运营经理", time: "2020 - 2021", logo: "./logo/meb.png", desc: "1、全域获客与BD，操盘达人矩阵投放\n2、双十一大促单日 GMV 破亿元\n3、创新“名医+爆品”策略驱动高客单转化" },
            { company: "字节跳动", short: "全球领先的科技互联网与数字内容生态平台", role: "新媒体运营主管", time: "2019 - 2020", logo: "./logo/bytedance.png", desc: "1、负责四川区域官方账号矩阵运营\n2、单月头条阅读量 8000W+，净增粉 10W+\n3、从0到1孵化 200W 粉丝 IP【万能的小孙】" }
        ];
        document.getElementById('work-container').innerHTML = data.map(w => `
            <div class="work-row">
                <div style="display:flex; align-items:flex-start;">
                    <div class="company-logo"><img src="${w.logo}" alt="logo"></div>
                    <div>
                        <div class="work-title">${w.company}</div>
                        <div class="work-short">${w.short}</div>
                        <div class="work-desc">${w.desc}</div>
                    </div>
                </div>
                <div class="work-right">
                    <div class="work-role">${w.role}</div>
                    <div class="work-time">${w.time}</div>
                </div>
            </div>`).join('');
    </script>
</body>
</html>
